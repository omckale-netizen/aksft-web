<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sync to Firebase</title></head>
<body style="font-family:sans-serif;padding:40px;background:#1A2744;color:#F5EDE0;">
<h2>Firebase Sync</h2>
<p>data.js'deki guncel verileri Firebase'e aktar.</p>
<button onclick="doSync()" id="btn" style="padding:12px 24px;background:#C4521A;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">Senkronla</button>
<pre id="log" style="margin-top:20px;background:rgba(0,0,0,.3);padding:20px;border-radius:8px;max-height:400px;overflow:auto;"></pre>
<script src="data.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
const app = initializeApp({apiKey:"AIzaSyCXqgczplchzjClAZt-Wl2eqgqmUMhLVJs",authDomain:"assosu-kesfet.firebaseapp.com",projectId:"assosu-kesfet",storageBucket:"assosu-kesfet.firebasestorage.app",messagingSenderId:"225032191860",appId:"1:225032191860:web:61ac6ba36764b530be3621"});
const db = getFirestore(app);
const auth = getAuth(app);
const log = document.getElementById('log');
window.doSync = async function() {
  document.getElementById('btn').disabled = true;
  log.textContent = 'Giris yapiliyor...\n';
  await signInWithEmailAndPassword(auth, 'info@onyedimedya.com', 'assos2026');
  log.textContent += 'Giris basarili.\n\n';
  const data = window.DATA;
  for (const [col, items] of [['venues',data.venues],['places',data.places],['villages',data.villages],['routes',data.routes]]) {
    log.textContent += col + ': ' + items.length + ' kayit aktariliyor...\n';
    for (const item of items) {
      await setDoc(doc(db, col, item.id), item);
      log.textContent += '  ✓ ' + item.title + '\n';
    }
  }
  log.textContent += '\n✅ Tamamlandi!';
  document.getElementById('btn').disabled = false;
};
</script>
</body></html>
