  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1A2744;--navy-deep:#0D1829;--navy-mid:#243255;
      --cream:#F5EDE0;--cream-light:#FAF7F2;--cream-mid:#EDE3D4;
      --terra:#C4521A;--terra-light:#D96B2E;
      --aegean:#1A6B8A;--aegean-light:#2490B8;
      --sage:#5A7A56;--amber:#D4935A;
      --text-dark:#1A2744;--text-mid:#4A5870;--text-muted:#718096;
    }
    html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream-light);color:var(--text-dark)}

    /* ── MAP LAYOUT ── */
    .map-wrap{position:relative;width:100%;height:calc(100vh - 72px);margin-top:72px}
    #map{width:100%;height:100%;z-index:1}

    /* ── FILTER BAR ── */
    .map-filters{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:6px;padding:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.06);max-width:calc(100% - 32px);overflow-x:auto;scrollbar-width:none}
    .map-filters::-webkit-scrollbar{display:none}
    .map-filter-btn{padding:8px 16px;border:none;border-radius:10px;background:transparent;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .map-filter-btn:hover{background:rgba(26,39,68,.06)}
    .map-filter-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(26,39,68,.2)}
    .map-filter-btn .mf-emoji{font-size:.9rem}
    .map-filter-btn .mf-count{font-size:.65rem;opacity:.6;margin-left:2px}

    /* ── SEARCH ── */
    .map-search{position:absolute;top:16px;right:16px;z-index:1000;width:240px}
    .map-search input{width:100%;padding:10px 14px 10px 36px;border:1px solid rgba(0,0,0,.08);border-radius:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-family:inherit;font-size:.82rem;color:var(--text-dark);box-shadow:0 4px 16px rgba(0,0,0,.08);outline:none;transition:border-color .2s}
    .map-search input:focus{border-color:var(--terra)}
    .map-search input::placeholder{color:var(--text-muted)}
    .map-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;pointer-events:none}

    /* ── INFO PANEL ── */
    .map-panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .map-panel.open{transform:translateY(0);pointer-events:all}
    .map-panel-inner{background:rgba(255,255,255,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.06);border-radius:20px 20px 0 0;padding:20px 24px 28px;box-shadow:0 -8px 40px rgba(0,0,0,.1);max-height:45vh;overflow-y:auto}
    .map-panel-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:0 auto 16px}
    .map-panel-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
    .map-panel-emoji{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
    .map-panel-info{flex:1;min-width:0}
    .map-panel-info h3{font-size:1.05rem;font-weight:800;color:var(--navy);margin-bottom:2px;line-height:1.3}
    .map-panel-info .mp-cat{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;display:inline-block}
    .map-panel-desc{font-size:.82rem;color:var(--text-mid);line-height:1.65;margin-bottom:14px}
    .map-panel-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:.78rem;color:var(--text-muted)}
    .map-panel-meta span{display:flex;align-items:center;gap:4px}
    .map-panel-close{position:absolute;top:16px;right:20px;width:32px;height:32px;border:none;border-radius:50%;background:rgba(0,0,0,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--text-mid);transition:background .2s}
    .map-panel-close:hover{background:rgba(0,0,0,.12)}
    .map-panel-link{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;background:var(--terra);color:#fff;text-decoration:none;font-size:.82rem;font-weight:700;transition:all .2s;margin-top:4px;border:none;cursor:pointer;font-family:inherit}
    .map-panel-link:hover{background:var(--terra-light);transform:translateY(-1px)}

    /* ── STATS BADGE ── */
    .map-stats{position:absolute;bottom:20px;right:16px;z-index:1000;background:rgba(26,39,68,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;padding:10px 16px;border-radius:12px;font-size:.72rem;font-weight:600;display:flex;gap:14px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .map-stats span{opacity:.6}
    .map-panel.open ~ .map-stats{display:none}

    /* ── CUSTOM MARKERS ── */
    .marker-pin{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.25);border:2.5px solid #fff;transition:transform .2s}
    .marker-pin span{transform:rotate(45deg);font-size:.85rem;line-height:1}
    .marker-pin.venue{background:var(--terra)}
    .marker-pin.place{background:var(--aegean)}
    .marker-pin.village{background:var(--sage)}

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-popup-content-wrapper{border-radius:12px !important;box-shadow:0 4px 20px rgba(0,0,0,.12) !important;padding:0 !important}
    .leaflet-popup-content{margin:0 !important;font-family:'Plus Jakarta Sans',sans-serif !important}
    .leaflet-popup-tip{display:none !important}
    .leaflet-control-zoom{border:none !important;box-shadow:0 2px 12px rgba(0,0,0,.1) !important;border-radius:12px !important;overflow:hidden}
    .leaflet-control-zoom a{width:36px !important;height:36px !important;line-height:36px !important;font-size:16px !important;color:var(--navy) !important;background:rgba(255,255,255,.92) !important;backdrop-filter:blur(12px) !important;border:none !important}
    .leaflet-control-zoom a:hover{background:#fff !important}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .map-wrap{height:calc(100vh - 60px);margin-top:60px}
      .map-filters{top:12px;left:12px;right:12px;transform:none;max-width:none}
      .map-search{top:70px;right:12px;left:12px;width:auto}
      .map-filter-btn{padding:7px 12px;font-size:.72rem}
      .map-panel-inner{padding:16px 18px 24px}
      .map-stats{bottom:16px;right:12px}
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="map-wrap">
  <!-- Filter Bar -->
  <div class="map-filters" id="map-filters">
    <button class="map-filter-btn active" data-filter="all" onclick="filterMap('all')">
      <span class="mf-emoji">🗺</span> Tumu <span class="mf-count" id="count-all"></span>
    </button>
    <button class="map-filter-btn" data-filter="venue" onclick="filterMap('venue')">
      <span class="mf-emoji">🏪</span> Mekanlar <span class="mf-count" id="count-venue"></span>
    </button>
    <button class="map-filter-btn" data-filter="place" onclick="filterMap('place')">
      <span class="mf-emoji">📍</span> Yerler <span class="mf-count" id="count-place"></span>
    </button>
    <button class="map-filter-btn" data-filter="village" onclick="filterMap('village')">
      <span class="mf-emoji">🏘</span> Koyler <span class="mf-count" id="count-village"></span>
    </button>
  </div>

  <!-- Search -->
  <div class="map-search">
    <span class="map-search-icon">🔍</span>
    <input type="text" id="map-search-input" placeholder="Mekan veya yer ara..." oninput="searchMap(this.value)">
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Info Panel -->
  <div class="map-panel" id="map-panel">
    <div class="map-panel-inner">
      <div class="map-panel-handle"></div>
      <button class="map-panel-close" onclick="closePanel()">✕</button>
      <div class="map-panel-head">
        <div class="map-panel-emoji" id="mp-emoji"></div>
        <div class="map-panel-info">
          <h3 id="mp-title"></h3>
          <span class="mp-cat" id="mp-cat"></span>
        </div>
      </div>
      <p class="map-panel-desc" id="mp-desc"></p>
      <div class="map-panel-meta" id="mp-meta"></div>
      <div style="margin-top:14px">
        <a class="map-panel-link" id="mp-link" href="#">Detayi Gor →</a>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="map-stats" id="map-stats"></div>
</div>

<div id="footer-placeholder"></div>

<script src="firebase-loader.js"></script>
<script src="data.js"></script>
<script src="shared.js?v=30"></script>
<script>

  'sokakagzi':             [39.4990, 26.2690]
};

const CAT_CONFIG = {
  venue:   { color: '#C4521A', bg: 'rgba(196,82,26,.12)', label: 'Mekan', pin: 'venue' },
  place:   { color: '#1A6B8A', bg: 'rgba(26,107,138,.12)', label: 'Yer',   pin: 'place' },
  village: { color: '#5A7A56', bg: 'rgba(90,122,86,.12)',  label: 'Koy',   pin: 'village' }
};

const VENUE_CATS = {
  kafe: 'Kafe', restoran: 'Restoran', kahvalti: 'Kahvalti',
  konaklama: 'Konaklama', beach: 'Beach', iskele: 'Iskele'
};

let map, markers = [], allItems = [], activeFilter = 'all', mapReady = false;

function pageInit() {
  if (mapReady) return; // prevent double init
  mapReady = true;
  renderNav({ heroMode: false });
  renderFooter({});
  initMap();
}

function initMap() {
  // Initialize Leaflet map centered on Assos region
  map = L.map('map', {
    center: [39.52, 26.32],
    zoom: 12,
    zoomControl: false,
    attributionControl: false
  });

  // Add tile layer — warm-toned map
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);

  // Zoom control — bottom left
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  // Attribution
  L.control.attribution({ position: 'bottomleft', prefix: false })
    .addAttribution('&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>')
    .addTo(map);

  // Build items from data
  buildItems();
  renderMarkers();
  updateCounts();

  // Close panel on map click
  map.on('click', function() { closePanel(); });
}

function buildItems() {
  allItems = [];
  const D = window.DATA || {};

  // Venues
  (D.venues || []).forEach(v => {
    const c = COORDS[v.id];
    if (!c) return;
    allItems.push({
      id: v.id, type: 'venue', lat: c[0], lng: c[1],
      title: v.title, emoji: v.emoji, shortDesc: v.shortDesc,
      category: VENUE_CATS[v.category] || v.category,
      location: v.location, hours: v.hours, phone: v.phone,
      images: v.images,
      link: 'mekanlar/mekan-detay.html?id=' + v.id
    });
  });

  // Places
  (D.places || []).forEach(p => {
    const c = COORDS[p.id];
    if (!c) return;
    allItems.push({
      id: p.id, type: 'place', lat: c[0], lng: c[1],
      title: p.title, emoji: p.emoji, shortDesc: p.shortDesc,
      category: p.badgeText || p.category,
      location: p.location,
      link: 'yerler.html#' + p.id
    });
  });

  // Villages
  (D.villages || []).forEach(v => {
    const c = COORDS[v.id];
    if (!c) return;
    allItems.push({
      id: v.id, type: 'village', lat: c[0], lng: c[1],
      title: v.title, emoji: v.emoji, shortDesc: v.shortDesc,
      category: 'Koy',
      location: v.title,
      link: 'koyler.html#' + v.id
    });
  });
}

function createMarkerIcon(type) {
  const cls = type;
  return L.divIcon({
    className: '',
    html: '<div class="marker-pin ' + cls + '"><span>' +
      (type === 'venue' ? '🏪' : type === 'place' ? '📍' : '🏘') +
      '</span></div>',
    iconSize: [36, 42],
    iconAnchor: [18, 42],
    popupAnchor: [0, -42]
  });
}

function renderMarkers() {
  // Clear existing
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  const filtered = activeFilter === 'all'
    ? allItems
    : allItems.filter(i => i.type === activeFilter);

  filtered.forEach(item => {
    const icon = createMarkerIcon(item.type);
    const marker = L.marker([item.lat, item.lng], { icon }).addTo(map);
    marker.on('click', () => openPanel(item));
    markers.push({ marker, item });
  });

  // Update stats
  const statsEl = document.getElementById('map-stats');
  statsEl.innerHTML = '<strong>' + filtered.length + '</strong> <span>konum haritada</span>';
}

function filterMap(type) {
  activeFilter = type;
  document.querySelectorAll('.map-filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === type);
  });
  renderMarkers();
  closePanel();
}

function searchMap(query) {
  const q = query.toLowerCase().trim();
  markers.forEach(({ marker, item }) => {
    const match = !q || item.title.toLowerCase().includes(q) ||
      (item.location || '').toLowerCase().includes(q) ||
      (item.category || '').toLowerCase().includes(q);
    if (match) {
      marker.setOpacity(1);
    } else {
      marker.setOpacity(0.15);
    }
  });
}

function updateCounts() {
  document.getElementById('count-all').textContent = '(' + allItems.length + ')';
  document.getElementById('count-venue').textContent = '(' + allItems.filter(i => i.type === 'venue').length + ')';
  document.getElementById('count-place').textContent = '(' + allItems.filter(i => i.type === 'place').length + ')';
  document.getElementById('count-village').textContent = '(' + allItems.filter(i => i.type === 'village').length + ')';
}

function openPanel(item) {
  const cfg = CAT_CONFIG[item.type];
  const panel = document.getElementById('map-panel');

  document.getElementById('mp-emoji').textContent = item.emoji;
  document.getElementById('mp-emoji').style.background = cfg.bg;
  document.getElementById('mp-title').textContent = item.title;

  const catEl = document.getElementById('mp-cat');
  catEl.textContent = item.category;
  catEl.style.background = cfg.bg;
  catEl.style.color = cfg.color;

  document.getElementById('mp-desc').textContent = item.shortDesc || '';

  // Meta info
  let metaHtml = '';
  if (item.location) metaHtml += '<span>📍 ' + item.location + '</span>';
  if (item.hours) metaHtml += '<span>🕐 ' + item.hours + '</span>';
  if (item.phone) metaHtml += '<span>📞 ' + item.phone + '</span>';
  document.getElementById('mp-meta').innerHTML = metaHtml;

  document.getElementById('mp-link').href = item.link;

  panel.classList.add('open');

  // Pan map to marker
  map.panTo([item.lat, item.lng], { animate: true, duration: 0.4 });
}

function closePanel() {
  document.getElementById('map-panel').classList.remove('open');
}

// dataReady may fire before this script runs (cache), so check both
document.addEventListener('dataReady', pageInit);
if (window.DATA && window.DATA.venues && window.DATA.venues.length > 0) {
  pageInit();
}
</script>
</body>
</html>
