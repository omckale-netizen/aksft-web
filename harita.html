<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harita — Assos'u Kesfet</title>
  <meta name="description" content="Assos ve Ayvacik'taki mekanlar, gezilecek yerler interaktif haritada.">
  <meta property="og:title" content="Harita — Assos'u Kesfet">
  <meta property="og:description" content="Assos ve Ayvacik'taki mekanlar, gezilecek yerler interaktif haritada.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://assosukesfet.com/harita">
  <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/assosu-kesfet.firebasestorage.app/o/site%2Fog-image.jpg?alt=media&token=70d62a44-9142-43d8-aee4-de790f5c7dcd">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:site_name" content="Assos'u Kesfet">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Harita — Assos'u Kesfet">
  <meta name="twitter:description" content="Assos ve Ayvacik'taki mekanlar, gezilecek yerler interaktif haritada.">
  <meta name="twitter:image" content="https://firebasestorage.googleapis.com/v0/b/assosu-kesfet.firebasestorage.app/o/site%2Fog-image.jpg?alt=media&token=70d62a44-9142-43d8-aee4-de790f5c7dcd">
  <link rel="canonical" href="https://assosukesfet.com/harita">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1A2744;--navy-deep:#0D1829;--cream:#F5EDE0;--cream-light:#FAF7F2;--terra:#C4521A;--terra-light:#D96B2E;--aegean:#1A6B8A;--text-dark:#1A2744;--text-mid:#4A5870;--text-muted:#718096}
    html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream-light);color:var(--text-dark)}

    /* ── HERO ── */
    .map-hero{position:relative;overflow:hidden;padding:120px 24px 48px;text-align:center;background:linear-gradient(160deg,#06101E 0%,#0C1A30 55%,#0A1520 100%)}
    .map-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(245,237,224,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(245,237,224,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
    .mh-orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none}
    .mh-orb-1{width:400px;height:400px;background:rgba(196,82,26,.1);top:-120px;right:-80px;animation:mhFloat 8s ease-in-out infinite}
    .mh-orb-2{width:300px;height:300px;background:rgba(26,107,138,.08);bottom:-80px;left:-60px;animation:mhFloat 10s ease-in-out infinite reverse}
    @keyframes mhFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
    .mh-content{position:relative;z-index:2;max-width:640px;margin:0 auto}
    .mh-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:.7rem;font-weight:700;color:rgba(245,237,224,.5);text-transform:uppercase;letter-spacing:.12em;margin-bottom:20px}
    .mh-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--terra);animation:mhPulse 2s infinite}
    @keyframes mhPulse{0%,100%{opacity:1}50%{opacity:.3}}
    .mh-h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;color:#F5EDE0;line-height:1.15;margin-bottom:12px;letter-spacing:-.02em}
    .mh-h1 em{font-family:'Lora',serif;font-style:italic;font-weight:500;color:var(--terra-light)}
    .mh-sub{font-size:.92rem;color:rgba(245,237,224,.4);max-width:460px;margin:0 auto;line-height:1.6}

    /* ── MAP SECTION ── */
    .map-section{position:relative;height:70vh;min-height:500px}
    #map{width:100%;height:100%;z-index:1}

    /* ── FILTER BAR ── */
    .map-filters{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:6px;padding:6px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.06);max-width:calc(100% - 32px);overflow-x:auto;scrollbar-width:none}
    .map-filters::-webkit-scrollbar{display:none}
    .map-filter-btn{padding:8px 16px;border:none;border-radius:10px;background:transparent;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
    .map-filter-btn:hover{background:rgba(26,39,68,.06)}
    .map-filter-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(26,39,68,.2)}
    .map-filter-btn .mf-count{font-size:.65rem;opacity:.6;margin-left:2px}

    /* ── SEARCH ── */
    .map-search{position:absolute;top:16px;right:16px;z-index:1000;width:220px}
    .map-search input{width:100%;padding:10px 14px 10px 36px;border:1px solid rgba(0,0,0,.08);border-radius:12px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);font-family:inherit;font-size:.82rem;color:var(--text-dark);box-shadow:0 4px 16px rgba(0,0,0,.08);outline:none;transition:border-color .2s}
    .map-search input:focus{border-color:var(--terra)}
    .map-search input::placeholder{color:var(--text-muted)}
    .map-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem;pointer-events:none}

    /* ── POPUP CARD ── */
    .popup-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;animation:popFadeIn .25s}
    .popup-overlay.open{display:flex}
    @keyframes popFadeIn{from{opacity:0}to{opacity:1}}
    .popup-card{background:#fff;border-radius:20px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.2);overflow:hidden;animation:popSlideUp .3s cubic-bezier(.4,0,.2,1);position:relative;max-height:90vh;overflow-y:auto}
    @keyframes popSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .popup-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;transition:background .2s;z-index:3}
    .popup-close:hover{background:rgba(0,0,0,.55)}

    .popup-img{position:relative;height:180px;overflow:hidden;background:linear-gradient(135deg,var(--navy),#243255)}
    .popup-img img{width:100%;height:100%;object-fit:cover}
    .popup-img-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.5rem}
    .popup-img-grad{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(0,0,0,.5))}
    .popup-badge{position:absolute;top:12px;left:12px;padding:5px 14px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

    .popup-body{padding:20px 22px 24px}
    .popup-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
    .popup-emoji{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0}
    .popup-title{font-size:1.1rem;font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:3px}
    .popup-loc{font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:4px}
    .popup-desc{font-size:.82rem;color:var(--text-mid);line-height:1.65;margin-bottom:16px}
    .popup-meta{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;font-size:.78rem;color:var(--text-muted)}
    .popup-meta-item{display:flex;align-items:center;gap:5px}
    .popup-sep{height:1px;background:rgba(0,0,0,.06);margin-bottom:16px}
    .popup-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .popup-nav-row{display:flex;gap:8px}

    .mp-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:700;text-decoration:none;border:none;cursor:pointer;font-family:inherit;transition:all .2s;flex:1;justify-content:center}
    .mp-btn:hover{transform:translateY(-1px)}
    .mp-btn-primary{background:var(--terra);color:#fff;box-shadow:0 2px 10px rgba(196,82,26,.25)}
    .mp-btn-primary:hover{background:var(--terra-light)}
    .mp-btn-google{background:#4285F4;color:#fff}
    .mp-btn-google:hover{background:#3275E4}
    .mp-btn-apple{background:#1D1D1F;color:#fff}
    .mp-btn-apple:hover{background:#333}
    .popup-nav-label{font-size:.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

    /* ── STATS ── */
    .map-stats{position:absolute;bottom:20px;right:16px;z-index:1000;background:rgba(26,39,68,.88);backdrop-filter:blur(12px);color:#fff;padding:10px 16px;border-radius:12px;font-size:.72rem;font-weight:600;display:flex;gap:14px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .map-stats span{opacity:.6}
    .popup-overlay.open ~ .map-section .map-stats{display:none}

    /* ── MARKERS ── */
    .marker-pin{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.25);border:2.5px solid #fff;transition:transform .15s}
    .marker-pin span{transform:rotate(45deg);font-size:.85rem;line-height:1}
    .marker-pin.venue{background:var(--terra)}
    .marker-pin.place{background:var(--aegean)}

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-popup-tip{display:none !important}
    .leaflet-control-zoom{border:none !important;box-shadow:0 2px 12px rgba(0,0,0,.1) !important;border-radius:12px !important;overflow:hidden}
    .leaflet-control-zoom a{width:36px !important;height:36px !important;line-height:36px !important;font-size:16px !important;color:var(--navy) !important;background:rgba(255,255,255,.94) !important;border:none !important}
    .leaflet-control-zoom a:hover{background:#fff !important}

    @media(max-width:768px){
      .map-hero{padding:100px 20px 36px}
      .map-section{height:65vh;min-height:420px}
      .map-filters{top:12px;left:12px;right:12px;transform:none;max-width:none}
      .map-search{top:66px;right:12px;left:12px;width:auto}
      .map-filter-btn{padding:7px 12px;font-size:.72rem}
      .mp-img-wrap{height:120px}
      .mp-body{padding:14px 16px 20px}
      .mp-actions{flex-direction:column}
      .mp-btn{justify-content:center}
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<!-- HERO -->
<section class="map-hero">
  <div class="mh-orb mh-orb-1"></div>
  <div class="mh-orb mh-orb-2"></div>
  <div class="mh-content">
    <div class="mh-badge"><span class="mh-badge-dot"></span> Interaktif Harita</div>
    <h1 class="mh-h1">Assos'u <em>Haritada</em> Kesfet</h1>
    <p class="mh-sub">Mekanlar, tarihi alanlar, koylar ve iskeleler — hepsini tek haritada gor, yol tarifini al.</p>
  </div>
</section>

<!-- MAP -->
<div class="map-section">
  <div class="map-filters" id="map-filters">
    <button class="map-filter-btn active" data-filter="all" onclick="filterMap('all')">
      🗺 Tumu <span class="mf-count" id="count-all"></span>
    </button>
    <button class="map-filter-btn" data-filter="venue" onclick="filterMap('venue')">
      🏪 Mekanlar <span class="mf-count" id="count-venue"></span>
    </button>
    <button class="map-filter-btn" data-filter="place" onclick="filterMap('place')">
      📍 Yerler <span class="mf-count" id="count-place"></span>
    </button>
  </div>
  <div class="map-search">
    <span class="map-search-icon">🔍</span>
    <input type="text" id="map-search-input" placeholder="Mekan veya yer ara..." oninput="searchMap(this.value)">
  </div>
  <div id="map"></div>

  <div class="map-stats" id="map-stats"></div>
</div>

<!-- Popup Overlay -->
<div class="popup-overlay" id="popup-overlay" onclick="if(event.target===this)closePanel()">
  <div class="popup-card" id="popup-card">
    <button class="popup-close" onclick="closePanel()">✕</button>
    <div class="popup-img" id="popup-img-wrap">
      <img id="popup-img" style="display:none">
      <div class="popup-img-empty" id="popup-img-empty"></div>
      <div class="popup-img-grad"></div>
      <div class="popup-badge" id="popup-badge"></div>
    </div>
    <div class="popup-body">
      <div class="popup-head">
        <div class="popup-emoji" id="popup-emoji"></div>
        <div>
          <div class="popup-title" id="popup-title"></div>
          <div class="popup-loc" id="popup-loc"></div>
        </div>
      </div>
      <p class="popup-desc" id="popup-desc"></p>
      <div class="popup-meta" id="popup-meta"></div>
      <div class="popup-sep"></div>
      <div class="popup-actions" id="popup-actions"></div>
      <div class="popup-nav-label">Yol Tarifi Al</div>
      <div class="popup-nav-row" id="popup-nav"></div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="firebase-loader.js"></script>
<script src="data.js"></script>
<script src="shared.js?v=30"></script>
<script>
const FALLBACK_COORDS = {
  'athena-tapinagi':[39.4907,26.3380],'assos-antik-liman':[39.4862,26.3365],
  'kadirga-koyu':[39.4780,26.3520],'behramkale-koyu':[39.4890,26.3350],
  'apollon-smintheion':[39.5520,26.2280],'ahmetce-iskelesi':[39.4970,26.2970],
  'adatepe-koyu-yer':[39.5180,26.3680],'sivrice-koyu':[39.4735,26.3180],
  'adatepe-zeytinyagi-muzesi':[39.5190,26.3700],'sokakagzi-koyu':[39.4990,26.2690],
  'yesil-liman':[39.5020,26.2480],
  'behram-kafe':[39.4892,26.3352],'korfez-balik':[39.4865,26.3368],
  'assos-tas-kahvalti':[39.4888,26.3345],'gun-batimi-kafe':[39.4905,26.3378],
  'kayalar-koy-evi':[39.5050,26.3150],'antik-liman-restoran':[39.4860,26.3362],
  'kadirga-plaj-kafe':[39.4785,26.3515],'ahmetce-iskele-kafe':[39.4968,26.2965],
  'sivrice-koy-duragi':[39.4738,26.3175]
};

const CAT_CONFIG = {
  venue: { color:'#C4521A', bg:'rgba(196,82,26,.1)', label:'Mekan' },
  place: { color:'#1A6B8A', bg:'rgba(26,107,138,.1)', label:'Yer' }
};
const VENUE_CATS = { kafe:'Kafe', restoran:'Restoran', kahvalti:'Kahvalti', konaklama:'Konaklama', beach:'Beach', iskele:'Iskele' };

let map, markers=[], allItems=[], activeFilter='all', mapInited=false;

function pageInit() {
  if (!mapInited) {
    mapInited = true;
    renderNav({ heroMode: false });
    renderFooter({});
    initMap();
  } else {
    buildItems(); renderMarkers(); updateCounts();
  }
}

function initMap() {
  map = L.map('map', { center:[39.52,26.32], zoom:12, zoomControl:false, attributionControl:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'bottomleft'}).addTo(map);
  L.control.attribution({position:'bottomleft',prefix:false}).addAttribution('&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>').addTo(map);
  buildItems(); renderMarkers(); updateCounts();
  map.on('click', closePanel);
}

function getCoords(item) {
  const lat=parseFloat(item.lat), lng=parseFloat(item.lng);
  if (lat && lng && !isNaN(lat) && !isNaN(lng)) return [lat,lng];
  return FALLBACK_COORDS[item.id] || null;
}

function buildItems() {
  allItems = [];
  const D = window.DATA || {};
  (D.venues||[]).forEach(v => {
    const c = getCoords(v); if (!c) return;
    allItems.push({ id:v.id, type:'venue', lat:c[0], lng:c[1], title:v.title, emoji:v.emoji,
      shortDesc:v.shortDesc, category:VENUE_CATS[v.category]||v.category, location:v.location,
      hours:v.hours, phone:v.phone, images:v.images, tags:v.tags,
      link:'mekanlar/mekan-detay.html?id='+v.id });
  });
  (D.places||[]).forEach(p => {
    const c = getCoords(p); if (!c) return;
    allItems.push({ id:p.id, type:'place', lat:c[0], lng:c[1], title:p.title, emoji:p.emoji,
      shortDesc:p.shortDesc, category:p.badgeText||p.category, location:p.location, tags:p.tags,
      link:'yerler.html#'+p.id });
  });
}

function createMarkerIcon(type, emoji) {
  return L.divIcon({ className:'', html:'<div class="marker-pin '+type+'"><span>'+(emoji||(type==='venue'?'🏪':'📍'))+'</span></div>', iconSize:[36,42], iconAnchor:[18,42] });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];
  const filtered = activeFilter==='all' ? allItems : allItems.filter(i=>i.type===activeFilter);
  filtered.forEach(item => {
    const marker = L.marker([item.lat,item.lng],{icon:createMarkerIcon(item.type,item.emoji)}).addTo(map);
    marker.on('click', () => openPanel(item));
    markers.push({marker,item});
  });
  document.getElementById('map-stats').innerHTML = '<strong>'+filtered.length+'</strong> <span>konum</span>';
}

function filterMap(type) {
  activeFilter = type;
  document.querySelectorAll('.map-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter===type));
  renderMarkers(); closePanel();
}

function searchMap(q) {
  q = q.toLowerCase().trim();
  markers.forEach(({marker,item}) => {
    const match = !q || item.title.toLowerCase().includes(q) || (item.location||'').toLowerCase().includes(q);
    marker.setOpacity(match ? 1 : 0.15);
  });
}

function updateCounts() {
  document.getElementById('count-all').textContent = '('+allItems.length+')';
  document.getElementById('count-venue').textContent = '('+allItems.filter(i=>i.type==='venue').length+')';
  document.getElementById('count-place').textContent = '('+allItems.filter(i=>i.type==='place').length+')';
}

function openPanel(item) {
  const cfg = CAT_CONFIG[item.type];
  const overlay = document.getElementById('popup-overlay');

  // Image
  const imgEl = document.getElementById('popup-img');
  const imgEmpty = document.getElementById('popup-img-empty');
  const firstImg = item.images && item.images[0];
  if (firstImg) {
    imgEl.src = firstImg;
    imgEl.style.display = 'block';
    imgEmpty.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    imgEl.src = '';
    imgEmpty.style.display = 'flex';
    imgEmpty.textContent = item.emoji;
  }

  // Badge
  const badge = document.getElementById('popup-badge');
  badge.textContent = item.category;
  badge.style.background = cfg.bg;
  badge.style.color = cfg.color;

  // Info
  document.getElementById('popup-emoji').textContent = item.emoji;
  document.getElementById('popup-emoji').style.background = cfg.bg;
  document.getElementById('popup-title').textContent = item.title;
  document.getElementById('popup-loc').innerHTML = item.location ? '📍 ' + item.location : '';
  document.getElementById('popup-desc').textContent = item.shortDesc || '';

  // Meta
  let meta = '';
  if (item.hours) meta += '<div class="popup-meta-item">🕐 '+item.hours+'</div>';
  if (item.phone) meta += '<div class="popup-meta-item">📞 '+item.phone+'</div>';
  document.getElementById('popup-meta').innerHTML = meta;

  // Actions
  let actions = '';
  if (item.type === 'venue') {
    actions += '<a class="mp-btn mp-btn-primary" href="'+item.link+'">🏪 Mekani Incele</a>';
  } else {
    actions += '<a class="mp-btn mp-btn-primary" href="'+item.link+'">📍 Detayi Gor</a>';
  }
  document.getElementById('popup-actions').innerHTML = actions;

  // Navigation
  const gUrl = 'https://www.google.com/maps/dir/?api=1&destination='+item.lat+','+item.lng;
  const aUrl = 'https://maps.apple.com/?daddr='+item.lat+','+item.lng;
  document.getElementById('popup-nav').innerHTML =
    '<a class="mp-btn mp-btn-google" href="'+gUrl+'" target="_blank" rel="noopener">Google Maps</a>' +
    '<a class="mp-btn mp-btn-apple" href="'+aUrl+'" target="_blank" rel="noopener"> Apple Harita</a>';

  overlay.classList.add('open');
  map.panTo([item.lat, item.lng], {animate:true, duration:0.4});
}

function closePanel() {
  document.getElementById('popup-overlay').classList.remove('open');
}

document.addEventListener('dataReady', pageInit);
if (window.DATA && window.DATA.venues && window.DATA.venues.length > 0) pageInit();
</script>
</body>
</html>
