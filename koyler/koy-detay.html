<div id="nav-placeholder"></div>
<div id="village-hero"></div>
<div id="village-body">
  <noscript>
    <div style="max-width:800px;margin:80px auto;padding:40px 24px;text-align:center;font-family:sans-serif">
      <h1 style="font-size:1.8rem;color:#1A2744;margin-bottom:16px">Assos Köyleri · Assos'u Keşfet</h1>
      <p style="color:#4A5568;line-height:1.7;margin-bottom:20px">Bu sayfa dinamik olarak yükleniyor. JavaScript etkin değilse aşağıdaki bağlantılardan devam edebilirsiniz.</p>
      <p><a href="../koyler.html" style="color:#C4521A;font-weight:600">Tüm Köyler</a> · <a href="../" style="color:#C4521A;font-weight:600">Ana Sayfa</a></p>
    </div>
  </noscript>

<script src="../shared.min.js?v=349"></script>
<script>
// Koy slug'ini URL'den cikar: once path (/koyler/slug), sonra query (?id=slug), sonra hash
function getKoySlugFromUrl() {
  var m = window.location.pathname.match(/^\/koyler\/([^\/\?#]+)\/?$/);
  if (m && m[1] && m[1] !== 'koy-detay' && m[1] !== 'koy-detay.html') return decodeURIComponent(m[1]);
  var params = new URLSearchParams(window.location.search);
  var q = params.get('id');
  if (q) return q;
  var h = window.location.hash.replace('#', '');
  return h || null;
}

function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  var villageId = getKoySlugFromUrl();
  if (!villageId) {
    document.getElementById('village-hero').innerHTML = '';
    document.getElementById('village-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Köy bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir köy seçin.</p><a href="/koyler" style="color:#C4521A;font-weight:600;">← Köylere Dön</a></div>';
    return;
  }

  function checkAndRender() {
    var exists = (window.DATA?.villages || []).some(function(v) { return v.id === villageId; });
    if (exists) {
      renderVillagePage(villageId);
    } else if (window.DATA && window.DATA.villages) {
      renderKoyBulunamadi();
    } else {
      renderVillagePage(villageId);
    }
  }
  checkAndRender();
  document.addEventListener('dataReady', checkAndRender);

  function renderKoyBulunamadi() {
    document.title = 'Köy Bulunamadı — Assos\'u Keşfet';
    var mr = document.querySelector('meta[name="robots"]');
    if (!mr) { mr = document.createElement('meta'); mr.name = 'robots'; document.head.appendChild(mr); }
    mr.content = 'noindex, nofollow';

    document.getElementById('village-hero').innerHTML =
      '<section style="position:relative;overflow:hidden;padding:130px 24px 60px;text-align:center;background:linear-gradient(150deg,#06101E 0%,#0A1A10 45%,#0C1E14 100%);">' +
        '<div style="position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(90,122,86,.15);top:-120px;right:-80px;"></div>' +
        '<div style="position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(26,107,138,.1);bottom:-80px;left:-60px;"></div>' +
        '<div style="position:relative;z-index:2;max-width:620px;margin:0 auto;">' +
          '<div style="font-size:3rem;margin-bottom:8px;opacity:.55">🏘️</div>' +
          '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:.68rem;font-weight:700;color:rgba(245,237,224,.5);text-transform:uppercase;letter-spacing:.14em;margin-bottom:20px">Bulunamadı</div>' +
          '<h1 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:800;color:#F5EDE0;line-height:1.12;margin-bottom:14px;letter-spacing:-.03em">Aradığın köy <em style="font-family:\'Lora\',serif;font-style:italic;font-weight:500;color:#7FB87B">burada değil</em></h1>' +
          '<p style="font-size:.88rem;color:rgba(245,237,224,.4);max-width:460px;margin:0 auto;line-height:1.6">Köy kaldırılmış, yeniden düzenleniyor ya da adresi değişmiş olabilir. Aşağıda diğer köylerimize göz atabilirsin.</p>' +
        '</div>' +
      '</section>';

    var suggestions = (window.DATA?.villages || []).slice(0, 6);
    var cardsHtml = suggestions.map(function(v) {
      var imgHtml = v.image
        ? '<img src="' + v.image + '" alt="' + (v.title || '') + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s" onload="this.style.opacity=1">'
        : '<div style="font-size:2rem;opacity:.55">🏘</div>';
      return '<a href="/koyler/' + v.id + '" style="display:block;background:#fff;border:1px solid rgba(26,39,68,.06);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;" onmouseover="this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 12px 32px rgba(26,39,68,.08)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">' +
          '<div style="height:110px;background:linear-gradient(135deg,#0A1A10,#1E3818);display:flex;align-items:center;justify-content:center;overflow:hidden">' + imgHtml + '</div>' +
          '<div style="padding:12px 14px"><div style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#5A7A56;margin-bottom:4px">' + (v.type === 'belde' ? 'Belde' : v.type === 'mahalle' ? 'Mahalle' : 'Köy') + '</div><h3 style="font-size:.85rem;font-weight:800;color:#1A2744;margin:0;line-height:1.3">' + (v.title || '') + '</h3></div>' +
        '</a>';
    }).join('');

    document.getElementById('village-body').innerHTML =
      '<section style="max-width:900px;margin:0 auto;padding:48px 24px 80px;">' +
        '<div style="text-align:center;padding:10px 0 8px">' +
          '<a href="/koyler" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#C4521A;color:#F5EDE0;border-radius:12px;text-decoration:none;font-weight:700;font-size:.88rem;transition:all .25s;box-shadow:0 6px 20px rgba(196,82,26,.25)" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 10px 28px rgba(196,82,26,.35)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'0 6px 20px rgba(196,82,26,.25)\'">Tüm Köylere Göz At →</a>' +
        '</div>' +
        (suggestions.length > 0 ?
          '<div style="margin-top:44px;padding-top:32px;border-top:1px solid rgba(0,0,0,.06)">' +
            '<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#718096;margin-bottom:24px;text-align:center">Bunlara göz atmak ister misin?</div>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">' + cardsHtml + '</div>' +
          '</div>'
        : '') +
      '</section>';
  }

  var village = (window.DATA?.villages || []).find(function(v) { return v.id === villageId; });
  if (village) {
    var vt = village.type || 'koy';
    var tl = village.title.toLowerCase();
    var seoName = village.title;
    if (vt === 'belde') { if (!tl.includes('belde')) seoName += ' Beldesi'; }
    else if (vt === 'mahalle') { var parentLbl = village.parent === 'kucukkuyu' ? 'Küçükkuyu' : 'Ayvacık'; seoName = parentLbl + ' ' + (tl.includes('mahalle') ? village.title : village.title + ' Mahallesi'); }
    else { if (!tl.includes('köy') && !tl.includes('koy')) seoName += ' Köyü'; }
    var seoTitle = seoName + ' — Assos Bölgesi | Assos\'u Keşfet';
    var seoDesc = village.title + ', Ayvacık bölgesinde';
    if (village.shortDesc) seoDesc += '. ' + village.shortDesc;
    if (village.tags && village.tags.length) seoDesc += '. ' + village.tags.join(', ');
    seoDesc = seoDesc.substring(0, 160);

    document.title = seoTitle;
    var dm = document.querySelector('meta[name="description"]');
    if (dm) dm.content = seoDesc;
    var ogT = document.querySelector('meta[property="og:title"]');
    var ogD = document.querySelector('meta[property="og:description"]');
    var ogU = document.querySelector('meta[property="og:url"]');
    var ogI = document.querySelector('meta[property="og:image"]');
    var twT = document.querySelector('meta[name="twitter:title"]');
    var twD = document.querySelector('meta[name="twitter:description"]');
    var twI = document.querySelector('meta[name="twitter:image"]');
    if (ogT) ogT.content = seoTitle;
    if (ogD) ogD.content = seoDesc;
    if (ogU) ogU.content = 'https://assosukesfet.com/koyler/' + villageId;
    if (village.image) {
      if (ogI) ogI.content = village.image;
      if (twI) twI.content = village.image;
    }
    if (twT) twT.content = seoTitle;
    if (twD) twD.content = seoDesc;

    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/koyler/' + villageId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Köyler','item':'https://assosukesfet.com/koyler'},
        {'@type':'ListItem','position':3,'name':village.title,'item':'https://assosukesfet.com/koyler/'+villageId}
      ]
    });
    document.head.appendChild(bcSchema);

    // TouristDestination Schema — koy sayfalari turist destinasyonu olarak isaretlenir
    var placeSchema = {
      '@context': 'https://schema.org',
      '@type': 'TouristDestination',
      'name': village.title,
      'description': village.description || village.shortDesc || '',
      'url': 'https://assosukesfet.com/koyler/' + villageId,
      'touristType': ['Gezgin','Aile','Cift','Kultur Turizmi'],
      'includesAttraction': { '@type': 'TouristAttraction', 'name': village.title + ' Koyu' },
      'address': {
        '@type': 'PostalAddress',
        'addressLocality': village.title,
        'addressRegion': 'Ayvacık, Çanakkale',
        'addressCountry': 'TR'
      }
    };
    if (village.image) placeSchema.image = village.image;
    if (village.lat && village.lng) {
      placeSchema.geo = { '@type': 'GeoCoordinates', 'latitude': village.lat, 'longitude': village.lng };
    }
    var ps = document.createElement('script');
    ps.type = 'application/ld+json';
    ps.textContent = JSON.stringify(placeSchema);
    document.head.appendChild(ps);
  }
}
document.addEventListener('dataReady', pageInit);
</script>
