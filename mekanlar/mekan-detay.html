<body>

<div id="vp-hero"></div>
<div id="vp-body"></div>
<div id="footer-placeholder"></div>

<script src="../shared.min.js?v=262"></script>
<script>
function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  // URL'den mekan ID'si al: ?id=behram-kafe veya #behram-kafe
  const params = new URLSearchParams(window.location.search);
  let venueId = params.get('id');
  if (!venueId) venueId = window.location.hash.replace('#', '');
  if (!venueId) {
    document.getElementById('vp-hero').innerHTML = '';
    document.getElementById('vp-body').innerHTML = `
      <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;">
        <div style="text-align:center;max-width:480px;">
          <div style="width:120px;height:120px;margin:0 auto 28px;background:linear-gradient(135deg,#FFF5EE,#FFECD2);border-radius:50%;display:flex;align-items:center;justify-content:center;">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#C4521A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
              <path d="M8 11h6" opacity=".5"/>
            </svg>
          </div>
          <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;color:#1A2744;margin:0 0 12px;font-weight:700;">Bu Mekan Bulunamadı</h2>
          <p style="color:#718096;font-size:.95rem;line-height:1.6;margin:0 0 32px;">
            Aradığınız mekan kaldırılmış, taşınmış veya geçici olarak erişime kapatılmış olabilir.
          </p>
          <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
            <a href="../mekanlar.html" style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#C4521A,#A3431A);color:#fff;padding:14px 32px;border-radius:12px;text-decoration:none;font-weight:600;font-size:.95rem;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 14px rgba(196,82,26,.25);"
               onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(196,82,26,.35)'"
               onmouseout="this.style.transform='';this.style.boxShadow='0 4px 14px rgba(196,82,26,.25)'">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Tüm Mekanları Keşfet
            </a>
            <a href="../" style="display:inline-flex;align-items:center;gap:6px;color:#718096;text-decoration:none;font-size:.9rem;padding:8px 16px;border-radius:8px;transition:color .2s,background .2s;"
               onmouseover="this.style.color='#C4521A';this.style.background='#FFF5EE'"
               onmouseout="this.style.color='#718096';this.style.background='transparent'">
              ← Ana Sayfaya Dön
            </a>
          </div>
        </div>
      </div>`;
    return;
  }

  // Mekanı render et
  renderVenuePage(venueId);

  // Sayfa başlığını güncelle
  const venue = (window.DATA?.venues || []).find(v => v.id === venueId);
  if (venue) {
    const catLabels = {kafe:'Assos Kafeler',restoran:'Assos Restoranlar',kahvalti:'Assos Kahvaltı Mekanları',konaklama:'Assos Otelleri',beach:'Assos Beach Club',iskele:'Assos İskeleler'};
    const catSingular = {kafe:'kafe',restoran:'restoran',kahvalti:'kahvaltı mekanı',konaklama:'otel',beach:'beach club',iskele:'iskele'};
    const catLabel = catLabels[venue.category] || 'Assos Mekanlar';
    const catSing = catSingular[venue.category] || 'mekan';
    const loc = venue.location || 'Assos';
    const seoTitle = venue.title + ' — ' + catLabel + ' | Assos\'u Keşfet';
    const descParts = [venue.title, loc + ' bölgesinde ' + catSing];
    if (venue.shortDesc) descParts.push(venue.shortDesc);
    if (venue.phone) descParts.push('İletişim ve yol tarifi');
    const seoDesc = descParts.join('. ').substring(0, 160);

    document.title = seoTitle;
    const descMeta = document.querySelector('meta[name="description"]');
    if (descMeta) descMeta.content = seoDesc;
    // OG taglarini guncelle
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const ogUrl = document.querySelector('meta[property="og:url"]');
    const ogImg = document.querySelector('meta[property="og:image"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');
    const twImg = document.querySelector('meta[name="twitter:image"]');
    if (ogTitle) ogTitle.content = seoTitle;
    if (ogDesc) ogDesc.content = seoDesc;
    if (ogUrl) ogUrl.content = 'https://assosukesfet.com/mekanlar/mekan-detay.html?id=' + venueId;
    if (venue.images && venue.images[0]) {
      if (ogImg) ogImg.content = venue.images[0];
      if (twImg) twImg.content = venue.images[0];
    }
    if (twTitle) twTitle.content = seoTitle;
    if (twDesc) twDesc.content = seoDesc;
    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/mekanlar/mekan-detay?id=' + venueId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Mekanlar','item':'https://assosukesfet.com/mekanlar'},
        {'@type':'ListItem','position':3,'name':venue.title,'item':'https://assosukesfet.com/mekanlar/mekan-detay?id='+venueId}
      ]
    });
    document.head.appendChild(bcSchema);

    // LocalBusiness Schema
    const schemaTypes = {kafe:'CafeOrCoffeeShop',restoran:'Restaurant',kahvalti:'Restaurant',konaklama:'Hotel',beach:'BarOrPub',iskele:'FoodEstablishment'};
    const schema = {
      '@context': 'https://schema.org',
      '@type': schemaTypes[venue.category] || 'LocalBusiness',
      'name': venue.title,
      'description': venue.shortDesc || '',
      'url': 'https://assosukesfet.com/mekanlar/mekan-detay?id=' + venueId,
      'address': {
        '@type': 'PostalAddress',
        'addressLocality': venue.location || 'Assos',
        'addressRegion': 'Çanakkale',
        'addressCountry': 'TR'
      }
    };
    if (venue.phone) schema.telephone = venue.phone;
    if (venue.address) schema.address.streetAddress = venue.address;
    if (venue.images && venue.images[0]) schema.image = venue.images[0];
    if (venue.website) schema.url = venue.website;
    if (venue.hours) schema.openingHours = venue.hours;
    if (venue.weeklyHours && venue.weeklyHours.length > 0) {
      schema.openingHoursSpecification = venue.weeklyHours.map(function(wh) {
        return { '@type': 'OpeningHoursSpecification', 'dayOfWeek': wh.days, 'opens': (wh.hours||'').split(' - ')[0], 'closes': (wh.hours||'').split(' - ')[1] || '' };
      });
    }
    if (venue.lat && venue.lng) {
      schema.geo = { '@type': 'GeoCoordinates', 'latitude': venue.lat, 'longitude': venue.lng };
    }
    var schemaScript = document.createElement('script');
    schemaScript.type = 'application/ld+json';
    schemaScript.textContent = JSON.stringify(schema);
    document.head.appendChild(schemaScript);
  }
}
document.addEventListener('dataReady', pageInit);
// Firebase verisi geldiğinde yeniden render et (güncel görseller için)
</script>
