<body>
<div id="nav-placeholder"></div>
<div id="vp-hero"></div>
<div id="vp-body">
  <!-- Crawler/noscript fallback: JS render olmazsa Google bos sayfa gormesin -->
  <noscript>
    <div style="max-width:800px;margin:80px auto;padding:40px 24px;text-align:center;font-family:sans-serif">
      <h1 style="font-size:1.8rem;color:#1A2744;margin-bottom:16px">Mekan Detayı · Assos'u Keşfet</h1>
      <p style="color:#4A5568;line-height:1.7;margin-bottom:20px">Bu sayfa dinamik olarak yükleniyor. JavaScript etkin değilse aşağıdaki bağlantılardan devam edebilirsiniz.</p>
      <p><a href="../mekanlar.html" style="color:#C4521A;font-weight:600">Tüm Mekanlar</a> · <a href="../" style="color:#C4521A;font-weight:600">Ana Sayfa</a></p>
    </div>
  </noscript>
</div>
<div id="footer-placeholder"></div>
<script src="../firebase-loader.js?v=6"></script>
<script src="../shared.min.js?v=364"></script>
<script>
// Mekan slug'ini URL'den cikar: once path (/kategori/slug), sonra query (?id=slug), sonra hash
// Path parsing window.CATEGORY_SLUG_TO_ID ile guvenli (shared.min.js yuklendikten sonra calisir)
function getMekanSlugFromUrl() {
  var m = window.location.pathname.match(/^\/([^\/\?#]+)\/([^\/\?#]+)\/?$/);
  if (m && window.CATEGORY_SLUG_TO_ID && window.CATEGORY_SLUG_TO_ID[m[1]]) {
    return { slug: decodeURIComponent(m[2]), category: window.CATEGORY_SLUG_TO_ID[m[1]] };
  }
  var params = new URLSearchParams(window.location.search);
  var q = params.get('id');
  if (q) return { slug: q, category: null };
  var h = window.location.hash.replace('#', '');
  return h ? { slug: h, category: null } : null;
}

function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  // URL'den mekan al: /oteller/sunaba-kasri veya ?id=behram-kafe veya #behram-kafe
  var parsed = getMekanSlugFromUrl();
  let venueId = parsed ? parsed.slug : null;

  function renderMekanBulunamadi() {
    // NOT: noindex EKLENMEZ — static data.js stale olabilir. SSR 410 ile gercek
    // not-found'u handle eder. Client-side inject etmek SSR'in dogru render
    // ettigi yeni mekanlari Google'dan dusurur.
    document.title = 'Mekan Bulunamadı — Assos\u2019u Keşfet';
    document.getElementById('vp-hero').innerHTML = '';
    var footer = document.getElementById('footer-placeholder'); if (footer) footer.style.display = 'none';
    document.getElementById('vp-body').innerHTML = `
      <div style="min-height:calc(100vh - 72px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:linear-gradient(180deg,#FAFAF8 0%,#FFF5EE 50%,#FFECD2 100%);position:relative;overflow:hidden;">
        <div style="position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(196,82,26,.06) 0%,transparent 70%);pointer-events:none"></div>
        <div style="position:absolute;bottom:-60px;left:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(26,39,68,.04) 0%,transparent 70%);pointer-events:none"></div>
        <div style="text-align:center;max-width:500px;position:relative;z-index:1;">
          <div style="position:relative;width:140px;height:140px;margin:0 auto 32px;">
            <div style="width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#fff,#FFF5EE);box-shadow:0 8px 32px rgba(196,82,26,.12),0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;justify-content:center;">
              <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8" stroke="#C4521A" stroke-width="1.5" fill="rgba(196,82,26,.06)"/>
                <path d="M21 21l-4.35-4.35" stroke="#C4521A" stroke-width="2"/>
                <path d="M9 11h4M11 9v4" stroke="#C4521A" stroke-width="1.5" opacity=".4" transform="rotate(45 11 11)"/>
              </svg>
            </div>
            <div style="position:absolute;top:8px;right:-4px;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;">
              <span style="font-size:14px;">🏛️</span>
            </div>
          </div>
          <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.75rem;color:#1A2744;margin:0 0 12px;font-weight:800;letter-spacing:-.02em;">Mekan Bulunamadı</h1>
          <p style="color:#718096;font-size:1rem;line-height:1.7;margin:0 0 40px;max-width:380px;margin-left:auto;margin-right:auto;">
            Aradığınız mekan kaldırılmış, taşınmış veya geçici olarak erişime kapatılmış olabilir.
          </p>
          <div style="display:flex;flex-direction:column;gap:14px;align-items:center;">
            <a href="../mekanlar.html" style="display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#C4521A,#A3431A);color:#fff;padding:16px 36px;border-radius:14px;text-decoration:none;font-weight:700;font-size:1rem;transition:all .25s ease;box-shadow:0 4px 16px rgba(196,82,26,.3);"
               onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 28px rgba(196,82,26,.4)'"
               onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(196,82,26,.3)'">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
              Mekanları Keşfet
            </a>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">
              <a href="../" style="display:inline-flex;align-items:center;gap:6px;color:#718096;text-decoration:none;font-size:.88rem;padding:10px 18px;border-radius:10px;transition:all .2s ease;border:1.5px solid transparent;"
                 onmouseover="this.style.color='#1A2744';this.style.background='#fff';this.style.borderColor='rgba(26,39,68,.1)';this.style.boxShadow='0 2px 8px rgba(0,0,0,.06)'"
                 onmouseout="this.style.color='#718096';this.style.background='transparent';this.style.borderColor='transparent';this.style.boxShadow='none'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                Ana Sayfa
              </a>
              <a href="../iletisim.html" style="display:inline-flex;align-items:center;gap:6px;color:#718096;text-decoration:none;font-size:.88rem;padding:10px 18px;border-radius:10px;transition:all .2s ease;border:1.5px solid transparent;"
                 onmouseover="this.style.color='#1A2744';this.style.background='#fff';this.style.borderColor='rgba(26,39,68,.1)';this.style.boxShadow='0 2px 8px rgba(0,0,0,.06)'"
                 onmouseout="this.style.color='#718096';this.style.background='transparent';this.style.borderColor='transparent';this.style.boxShadow='none'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                İletişim
              </a>
            </div>
          </div>
        </div>
        <div style="position:absolute;bottom:24px;text-align:center;color:rgba(113,128,150,.5);font-size:.75rem;">
          © ${new Date().getFullYear()} Assos'u Keşfet
        </div>
      </div>`;
  }

  if (!venueId) {
    renderMekanBulunamadi();
    return;
  }

  // Mekanı render et
  function checkAndRender() {
    var exists = (window.DATA?.venues || []).some(function(v) { return v.id === venueId; });
    if (exists) {
      renderVenuePage(venueId);
      applySeoMeta();
    } else if (window.DATA && window.DATA.venues) {
      // DATA yuklendi ama mekan yok
      renderMekanBulunamadi();
    } else {
      // DATA henuz yok
      renderVenuePage(venueId);
    }
  }
  checkAndRender();
  // Firebase'den guncel veri geldiginde tekrar kontrol
  document.addEventListener('dataReady', checkAndRender);

  function applySeoMeta() {
  const venue = (window.DATA?.venues || []).find(v => v.id === venueId);
  if (venue) {
    const catLabels = {kafe:'Assos Kafeler',restoran:'Assos Restoranlar',kahvalti:'Assos Kahvaltı Mekanları',konaklama:'Assos Otelleri',beach:'Assos Beach Club',iskele:'Assos İskeleler'};
    const catSingular = {kafe:'kafe',restoran:'restoran',kahvalti:'kahvaltı mekanı',konaklama:'otel',beach:'beach club',iskele:'iskele'};
    const catLabel = catLabels[venue.category] || 'Assos Mekanlar';
    const catSing = catSingular[venue.category] || 'mekan';
    const loc = venue.location || 'Assos';
    const seoTitle = venue.location
      ? venue.title + ', ' + venue.location + ' — ' + catLabel + ' | Assos\'u Keşfet'
      : venue.title + ' — ' + catLabel + ' | Assos\'u Keşfet';
    const descParts = [venue.title, loc + ' bölgesinde ' + catSing];
    if (venue.shortDesc) descParts.push(venue.shortDesc);
    if (venue.phone) descParts.push('İletişim ve yol tarifi');
    const seoDesc = descParts.join('. ').substring(0, 160);

    // SSR zaten title set ettiyse dokunma (flicker fix)
    if (document.title === 'Mekan — Assos\'u Keşfet' || !document.title.includes(venue.title)) document.title = seoTitle;
    const descMeta = document.querySelector('meta[name="description"]');
    if (descMeta && descMeta.content.length < 100) descMeta.content = seoDesc;
    // OG taglarini guncelle
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const ogUrl = document.querySelector('meta[property="og:url"]');
    const ogImg = document.querySelector('meta[property="og:image"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');
    const twImg = document.querySelector('meta[name="twitter:image"]');
    if (ogTitle) ogTitle.content = seoTitle;
    if (ogDesc) ogDesc.content = seoDesc;
    if (ogUrl) ogUrl.content = (window.getVenueUrl ? ('https://assosukesfet.com' + window.getVenueUrl(venue)) : ('https://assosukesfet.com/mekanlar/mekan-detay.html?id=' + venueId));
    if (venue.images && venue.images[0]) {
      if (ogImg) ogImg.content = venue.images[0];
      if (twImg) twImg.content = venue.images[0];
    }
    if (twTitle) twTitle.content = seoTitle;
    if (twDesc) twDesc.content = seoDesc;
    // Canonical URL
    var canonicalUrl = (window.getVenueUrl ? ('https://assosukesfet.com' + window.getVenueUrl(venue)) : ('https://assosukesfet.com/mekanlar/mekan-detay.html?id=' + venueId));
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema - 4 seviye (Anasayfa > Mekanlar > Kategori > Mekan)
    var bcItems = [
      {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
      {'@type':'ListItem','position':2,'name':'Mekanlar','item':'https://assosukesfet.com/mekanlar'}
    ];
    var catInfo = window.CATEGORIES && window.CATEGORIES[venue.category];
    if (catInfo) {
      bcItems.push({'@type':'ListItem','position':3,'name':catInfo.plural,'item':'https://assosukesfet.com/' + catInfo.slug});
      bcItems.push({'@type':'ListItem','position':4,'name':venue.title,'item':'https://assosukesfet.com' + window.getVenueUrl(venue)});
    } else {
      bcItems.push({'@type':'ListItem','position':3,'name':venue.title,'item':'https://assosukesfet.com/mekanlar/mekan-detay.html?id=' + venueId});
    }
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement': bcItems
    });
    document.head.appendChild(bcSchema);

    // LocalBusiness Schema — SSR zaten ekledyse atla (duplicate onle)
    if (document.querySelector('script[data-ssr="localbusiness"]')) return;
    const schemaTypes = {kafe:'CafeOrCoffeeShop',restoran:'Restaurant',kahvalti:'Restaurant',konaklama:'Hotel',beach:'BarOrPub',iskele:'FoodEstablishment'};
    const schema = {
      '@context': 'https://schema.org',
      '@type': schemaTypes[venue.category] || 'LocalBusiness',
      'name': venue.title,
      'description': venue.shortDesc || '',
      'url': (window.getVenueUrl ? ('https://assosukesfet.com' + window.getVenueUrl(venue)) : ('https://assosukesfet.com/mekanlar/mekan-detay.html?id=' + venueId)),
      'address': {
        '@type': 'PostalAddress',
        'addressLocality': venue.location || 'Assos',
        'addressRegion': 'Çanakkale',
        'addressCountry': 'TR'
      }
    };
    if (venue.phone) schema.telephone = venue.phone;
    if (venue.address) schema.address.streetAddress = venue.address;
    if (venue.images && venue.images[0]) schema.image = venue.images[0];
    if (venue.website) schema.url = venue.website;
    if (venue.hours) schema.openingHours = venue.hours;
    if (venue.weeklyHours && venue.weeklyHours.length > 0) {
      schema.openingHoursSpecification = venue.weeklyHours.map(function(wh) {
        return { '@type': 'OpeningHoursSpecification', 'dayOfWeek': wh.days, 'opens': (wh.hours||'').split(' - ')[0], 'closes': (wh.hours||'').split(' - ')[1] || '' };
      });
    }
    if (venue.lat && venue.lng) {
      schema.geo = { '@type': 'GeoCoordinates', 'latitude': venue.lat, 'longitude': venue.lng };
    }
    var schemaScript = document.createElement('script');
    schemaScript.type = 'application/ld+json';
    schemaScript.textContent = JSON.stringify(schema);
    document.head.appendChild(schemaScript);
  }
  } // applySeoMeta
}
document.addEventListener('dataReady', pageInit);
// Firebase verisi geldiğinde yeniden render et (güncel görseller için)
</script>



</body>
</html>
