  <style>@keyframes ylHeroOrb{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.06)}}@keyframes ylFadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}@keyframes ylPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,82,26,.4)}50%{box-shadow:0 0 0 8px rgba(196,82,26,0)}}@keyframes ylLineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}.yl-hero{position:relative;overflow:hidden;background:linear-gradient(150deg,#06101E 0%,#0C1A30 55%,#091420 100%);display:flex;align-items:center;justify-content:center;padding:0 24px}.yl-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(245,237,224,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,237,224,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}.yl-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}.yl-orb-1{width:460px;height:460px;background:rgba(196,82,26,.15);top:-120px;right:-60px;animation:ylHeroOrb 17s ease-in-out infinite}.yl-orb-2{width:360px;height:360px;background:rgba(26,107,138,.14);bottom:-100px;left:-80px;animation:ylHeroOrb 14s ease-in-out infinite reverse 1s}.yl-orb-3{width:220px;height:220px;background:rgba(212,147,90,.12);top:35%;right:30%;animation:ylHeroOrb 19s ease-in-out infinite 2s}.yl-hero-inner{position:relative;z-index:2;max-width:900px;width:100%;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;padding:110px 0 80px}.yl-hero-left{}.yl-hero-eyebrow{display:inline-flex;align-items:center;gap:10px;background:rgba(196,82,26,.1);border:1px solid rgba(196,82,26,.25);border-radius:999px;padding:6px 16px;margin-bottom:22px;animation:ylFadeUp .7s both}.yl-hero-eyebrow-dot{width:7px;height:7px;border-radius:50%;background:#C4521A;animation:ylPulse 2.4s ease-in-out infinite;flex-shrink:0}.yl-hero-eyebrow span{font-size:.65rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:#D4935A}.yl-hero-h1{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:clamp(2.4rem,5.5vw,3.8rem);letter-spacing:-.03em;line-height:1.0;color:#F5EDE0;margin-bottom:16px;animation:ylFadeUp .8s .1s both}.yl-hero-h1 em{font-style:italic;font-family:'Lora',serif;font-weight:500;font-size:.88em;background:linear-gradient(135deg,#D4935A,#E8A07A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.yl-hero-divider{width:52px;height:2px;background:linear-gradient(90deg,#C4521A,transparent);margin-bottom:16px;transform-origin:left;animation:ylLineGrow .9s .3s cubic-bezier(.16,1,.3,1) both}.yl-hero-sub{font-size:.95rem;color:rgba(245,237,224,.6);line-height:1.75;max-width:440px;animation:ylFadeUp .8s .22s both}.yl-hero-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 32px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:20px;min-width:180px;animation:ylFadeUp .8s .35s both}.yl-stat-item{text-align:center}.yl-stat-num{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.9rem;color:#F5EDE0;letter-spacing:-.03em;line-height:1;margin-bottom:4px}.yl-stat-num span{color:#D4935A}.yl-stat-label{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,237,224,.4)}.yl-stat-sep{height:1px;background:rgba(255,255,255,.08)}.yl-hero-cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px;animation:ylFadeUp .8s .45s both}.yl-cat-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 14px;font-size:.72rem;font-weight:600;color:rgba(245,237,224,.55);backdrop-filter:blur(8px)}@media(max-width:700px){.yl-hero-inner{grid-template-columns:1fr;padding:100px 0 60px}.yl-hero-card{flex-direction:row;flex-wrap:wrap;justify-content:center;min-width:unset}}</style>

<body>

<div id="nav-placeholder"></div>

<!-- YERLER HERO -->
<div class="yl-hero">
  <div class="yl-orb yl-orb-1"></div>
  <div class="yl-orb yl-orb-2"></div>
  <div class="yl-orb yl-orb-3"></div>
  <div class="yl-hero-inner">
    <div class="yl-hero-left">
      <div class="yl-hero-eyebrow">
        <span class="yl-hero-eyebrow-dot"></span>
        <span>Assos'un Saklı Köşeleri</span>
      </div>
      <h1 class="yl-hero-h1">Assos Gezilecek<br><em>Yerler</em></h1>
      <div class="yl-hero-divider"></div>
      <p class="yl-hero-sub">Antik tapınaklardan kristal koylara, taş köylerden tarihi iskeleler — Assos'un her özel noktası bir arada.</p>
      <div class="yl-hero-cats">
        <span class="yl-cat-chip">🏛 Tarihi Alanlar</span>
        <span class="yl-cat-chip">🌊 Koylar</span>
        <span class="yl-cat-chip">🏘 Köyler</span>
        <span class="yl-cat-chip">⚓ İskeleler</span>
      </div>
    </div>
    <div class="yl-hero-card">
      <div class="yl-stat-item">
        <div class="yl-stat-num" id="yl-stat-toplam"><span></span></div>
        <div class="yl-stat-label">Toplam Yer</div>
      </div>
      <div class="yl-stat-sep"></div>
      <div class="yl-stat-item">
        <div class="yl-stat-num" id="yl-stat-tarihi"><span></span></div>
        <div class="yl-stat-label">Tarihi Alan</div>
      </div>
      <div class="yl-stat-sep"></div>
      <div class="yl-stat-item">
        <div class="yl-stat-num" id="yl-stat-koy"><span></span></div>
        <div class="yl-stat-label">Koy</div>
      </div>
    </div>
  </div>
</div>

<!-- PLACE DETAIL MODAL -->
<div id="place-modal" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(13,24,41,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:24px;">
  <div id="place-modal-content" style="background:var(--cream-light);border-radius:24px;max-width:580px;width:100%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.4);">
    <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(26,39,68,.08);border:none;font-size:1rem;cursor:pointer;color:var(--text-mid);z-index:1;transition:background .2s;" onmouseover="this.style.background='rgba(26,39,68,.15)'" onmouseout="this.style.background='rgba(26,39,68,.08)'">✕</button>
    <div id="place-modal-body"></div>
  </div>
</div>

<!-- MAIN -->
<section style="padding:64px 24px 100px;background:var(--cream-light);">
  <div style="max-width:1280px;margin:0 auto;">

    <!-- Filter -->
    <div class="scroll-x" style="display:flex;gap:8px;padding-bottom:4px;margin-bottom:40px;" role="group">
      <button class="filter-btn active" onclick="filterPlaces(this,'all')">Tümü</button>
      <button class="filter-btn" onclick="filterPlaces(this,'tarihi')">🏛 Tarihi Alan</button>
      <button class="filter-btn" onclick="filterPlaces(this,'koy')">🌊 Koy</button>
      <button class="filter-btn" onclick="filterPlaces(this,'koyu')">🏘 Köy</button>
      <button class="filter-btn" onclick="filterPlaces(this,'iskele')">⚓ İskele</button>
      <button class="filter-btn" onclick="filterPlaces(this,'muze')">📜 Müze</button>
    </div>

    <div id="places-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;"></div>
    <div id="no-places" style="display:none;text-align:center;padding:60px 0;">
      <div style="font-size:2rem;margin-bottom:12px;">🗺</div>
      <p style="color:var(--text-soft);">Bu kategoride yer bulunamadı.</p>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<style>.place-card-wrap{background:#fff;border-radius:18px;overflow:hidden;border:1px solid rgba(26,39,68,.06);cursor:pointer;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s cubic-bezier(.16,1,.3,1);position:relative}.place-card-wrap:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(26,39,68,.1)}@keyframes imgShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}.place-img-box{aspect-ratio:4/3;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.5rem}.place-img-box.has-img{background:linear-gradient(90deg,#e8e4de 25%,#f0ece6 50%,#e8e4de 75%);background-size:800px 100%;animation:imgShimmer 1.5s infinite linear}.place-img-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s ease}.place-img-box img.loaded{opacity:1}.place-save-btn.saved{background:rgba(196,82,26,.85) !important;color:#fff !important}.place-save-btn:hover{transform:scale(1.1)}</style>

<script src="firebase-loader.js"></script>
<script src="data.js"></script>
<script src="shared.min.js?v=53"></script>
<script>
function pageInit() {
  renderNav({ heroMode: false });
  renderFooter();

  /* Hero stats */
  (function() {
    if (typeof DATA === 'undefined') return;
    const places = DATA.places || [];
    const set = (id, val) => { const el = document.querySelector('#' + id + ' span'); if (el) el.textContent = val; };
    set('yl-stat-toplam', places.length + '+');
    set('yl-stat-tarihi', places.filter(p => p.category === 'tarihi').length + '+');
    set('yl-stat-koy',    places.filter(p => p.category === 'koy').length + '+');
  })();

  const CAT_COLORS = {
    tarihi: { bg: ['#2A3F6A','#1A2744'], badge: 'rgba(26,39,68,.7)', label: 'Antik Alan' },
    koy:    { bg: ['#1A5060','#0D3040'], badge: 'rgba(26,107,138,.75)', label: 'Koy' },
    koyu:   { bg: ['#3A2A1A','#5A3C20'], badge: 'rgba(196,82,26,.75)', label: 'Köy' },
    iskele: { bg: ['#1A3050','#0D2040'], badge: 'rgba(26,39,68,.75)', label: 'İskele' },
    muze:   { bg: ['#3A4A20','#2A3818'], badge: 'rgba(90,122,86,.75)', label: 'Müze' },
  };

  let activeFilter = 'all';

  function filterPlaces(btn, cat) {
    activeFilter = cat;
    document.querySelectorAll('[onclick^="filterPlaces"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('places-grid');
    const noRes = document.getElementById('no-places');
    const places = activeFilter === 'all' ? DATA.places : DATA.places.filter(p => p.category === activeFilter);
    if (places.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
    noRes.style.display = 'none';
    grid.innerHTML = places.map((p, i) => {
      const cat = CAT_COLORS[p.category] || CAT_COLORS.tarihi;
      return `
      <div class="place-card-wrap fade-up" data-delay="${i * 0.06}" onclick="openPlace('${p.id}')">
        <div class="place-img-box${p.image ? ' has-img' : ''}" style="background-color:${p.image ? '' : 'transparent'};${p.image ? '' : 'background:linear-gradient(135deg,'+cat.bg[0]+','+cat.bg[1]+');'}">
          ${p.image ? '<img src="' + p.image + '" alt="' + p.title + '" style="object-position:center ' + (p.imagePos != null ? p.imagePos : 50) + '%" onload="this.classList.add(\'loaded\')">' : p.emoji}
          <span style="position:absolute;top:12px;left:12px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:${cat.badge};color:#fff;backdrop-filter:blur(8px);z-index:1;">${cat.label}</span>
          <button class="place-save-btn${window.isPlaceSaved && isPlaceSaved(p.id) ? ' saved' : ''}" data-id="${p.id}" onclick="event.stopPropagation();togglePlaceSave('${p.id}')" style="position:absolute;top:10px;right:10px;z-index:2;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;">${window.isPlaceSaved && isPlaceSaved(p.id) ? '♥' : '♡'}</button>
        </div>
        <div style="padding:18px 20px 20px;">
          <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);margin-bottom:6px;">${p.title}</h3>
          <p style="font-size:.82rem;color:var(--text-mid);line-height:1.6;margin-bottom:12px;">${p.shortDesc}</p>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">
            ${(p.tags||[]).map(t=>`<span style="font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(26,39,68,.06);color:var(--text-mid);">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;
    }).join('');
    scrollFadeIn();
    const paramId = getParam('id');
    if (paramId) setTimeout(() => openPlace(paramId), 200);
  }

  function openPlace(id) {
    const p = DATA.places.find(x => x.id === id);
    if (!p) return;
    const cat = CAT_COLORS[p.category] || CAT_COLORS.tarihi;
    document.getElementById('place-modal-body').innerHTML = `
      <div style="background:linear-gradient(135deg,${cat.bg[0]}cc,${cat.bg[1]}cc);padding:48px 32px 32px;text-align:center;border-radius:24px 24px 0 0;">
        <div style="font-size:4rem;margin-bottom:14px;">${p.emoji}</div>
        <span style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:999px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);margin-bottom:12px;display:inline-block;">${cat.label}</span>
        <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.6rem;color:#fff;margin-top:8px;">${p.title}</h2>
        <p style="font-size:.8rem;color:rgba(255,255,255,.55);margin-top:8px;">📍 ${p.location || ''}</p>
      </div>
      <div style="padding:28px 32px 32px;">
        <p style="color:var(--text-mid);font-size:.9rem;line-height:1.8;margin-bottom:20px;">${p.description || p.shortDesc}</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${(p.tags||[]).map(t=>`<span style="font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(26,39,68,.06);color:var(--text-mid);">${t}</span>`).join('')}
        </div>
        ${p.tip ? `<div class="tip-box" style="margin-top:16px;">${p.tip}</div>` : ''}
      </div>
    `;
    document.getElementById('place-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('place-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.getElementById('place-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('place-modal')) closeModal();
  });

  // Expose functions to global scope for onclick handlers
  window.filterPlaces = filterPlaces;
  window.openPlace = openPlace;
  window.closeModal = closeModal;
  window.renderPlacesGrid = renderGrid;

  renderGrid();
}
document.addEventListener('dataReady', pageInit);
</script>
</body>
</html>
