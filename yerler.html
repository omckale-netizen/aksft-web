a Sans',sans-serif;font-weight:800;font-size:clamp(2.4rem,5.5vw,3.8rem);letter-spacing:-.03em;line-height:1.0;color:#F5EDE0;margin-bottom:16px;animation:ylFadeUp .8s .1s both}.yl-hero-h1 em{font-style:italic;font-family:'Lora',serif;font-weight:500;font-size:.88em;background:linear-gradient(135deg,#D4935A,#E8A07A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.yl-hero-divider{width:52px;height:2px;background:linear-gradient(90deg,#C4521A,transparent);margin-bottom:16px;transform-origin:left;animation:ylLineGrow .9s .3s cubic-bezier(.16,1,.3,1) both}.yl-hero-sub{font-size:.95rem;color:rgba(245,237,224,.6);line-height:1.75;max-width:440px;animation:ylFadeUp .8s .22s both}.yl-hero-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px 32px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:20px;min-width:180px;animation:ylFadeUp .8s .35s both}.yl-stat-item{text-align:center}.yl-stat-num{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.9rem;color:#F5EDE0;letter-spacing:-.03em;line-height:1;margin-bottom:4px}.yl-stat-num span{color:#D4935A}.yl-stat-label{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,237,224,.4)}.yl-stat-sep{height:1px;background:rgba(255,255,255,.08)}.yl-hero-cats{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px;animation:ylFadeUp .8s .45s both}.yl-cat-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px 14px;font-size:.72rem;font-weight:600;color:rgba(245,237,224,.55);backdrop-filter:blur(8px)}@media(max-width:700px){.yl-hero-inner{grid-template-columns:1fr;padding:100px 0 60px}.yl-hero-card{flex-direction:row;flex-wrap:wrap;justify-content:center;min-width:unset}}</style>

<script>
function pageInit() {
  renderNav({ heroMode: false });
  renderFooter();

  // Filtre durumu — sessionStorage'dan restore (IIFE'den önce tanımlı olmalı)
  const YL_FILTER_KEY = 'yl_filter_cat';
  let activeFilter = sessionStorage.getItem(YL_FILTER_KEY) || 'all';

  /* Hero — dinamik kategori chip'leri, stats ve filtreler */
  (function() {
    if (typeof DATA === 'undefined') return;
    var places = DATA.places || [];
    var cats = (DATA.placeCategories && DATA.placeCategories.length > 0) ? DATA.placeCategories : [];

    // Hero chip'leri
    var chipsEl = document.getElementById('yl-hero-cats');
    if (chipsEl && cats.length > 0) {
      chipsEl.innerHTML = cats.map(function(c) {
        return '<span class="yl-cat-chip">' + (c.emoji || '📍') + ' ' + c.label + '</span>';
      }).join('');
    }

    // Hero stats — toplam + en çok kullanılan 2 kategori
    var statsEl = document.getElementById('yl-hero-stats');
    if (statsEl) {
      var statsHtml = '<div class="yl-stat-item"><div class="yl-stat-num"><span>' + places.length + '+</span></div><div class="yl-stat-label">Toplam Yer</div></div>';
      var catCounts = {};
      places.forEach(function(p) { catCounts[p.category] = (catCounts[p.category] || 0) + 1; });
      var sortedCats = Object.keys(catCounts).sort(function(a, b) { return catCounts[b] - catCounts[a]; }).slice(0, 2);
      sortedCats.forEach(function(catId) {
        var ci = typeof getPlaceCatInfo === 'function' ? getPlaceCatInfo(catId) : { label: catId };
        statsHtml += '<div class="yl-stat-sep"></div><div class="yl-stat-item"><div class="yl-stat-num"><span>' + catCounts[catId] + '+</span></div><div class="yl-stat-label">' + ci.label + '</div></div>';
      });
      statsEl.innerHTML = statsHtml;
    }

    // Filtre butonları — sadece alttaki grid'de sonucu olan kategoriler
    var filtersEl = document.getElementById('yl-filters');
    if (filtersEl) {
      var gridPlaces = places.filter(function(p) { return !p.mustSee && p.category !== 'tarihi' && p.category !== 'orenyeri'; });
      var usedCats = {};
      gridPlaces.forEach(function(p) { if (p.category) usedCats[p.category] = true; });
      var hasVillagePlaces = (DATA.villages || []).some(function(v) { return v.showInPlaces; });
      if (hasVillagePlaces) usedCats['koyu'] = true;
      var filterHtml = '<button class="filter-btn active" onclick="filterPlaces(this,\'all\')">Tümü</button>';
      // Dinamik kategoriler veya fallback
      var catList = cats.length > 0 ? cats : Object.keys(usedCats).map(function(id) { var ci = typeof getPlaceCatInfo === 'function' ? getPlaceCatInfo(id) : {label:id,emoji:'📍'}; return {id:id,label:ci.label,emoji:ci.emoji}; });
      catList.forEach(function(c) {
        if (usedCats[c.id]) {
          filterHtml += '<button class="filter-btn" onclick="filterPlaces(this,\'' + c.id + '\')">' + (c.emoji || '📍') + ' ' + c.label + '</button>';
        }
      });
      if (Object.keys(usedCats).length > 0) {
        filtersEl.innerHTML = filterHtml;
        // sessionStorage'dan gelen filtreyi yansıt — 'all' değilse active class'ı taşı
        if (activeFilter && activeFilter !== 'all') {
          var allBtn = filtersEl.querySelector('[onclick*="\'all\'"]');
          if (allBtn) allBtn.classList.remove('active');
          var savedBtn = filtersEl.querySelector('[onclick*="\'' + activeFilter + '\'"]');
          if (savedBtn) savedBtn.classList.add('active');
        }
        filtersEl.style.display = 'flex';
      }
    }
  })();

  function getCatInfo(catId) {
    return typeof getPlaceCatInfo === 'function' ? getPlaceCatInfo(catId) : { label: catId || 'Yer', emoji: '📍', color: '#1A2744', bg: ['#243255','#1A2744'] };
  }

  // Mutlaka Görülmesi Gereken Yerler (ören yerleri)
  (function() {
    var orenYerleri = (DATA.places || []).filter(function(p) { return p.mustSee || p.category === 'tarihi' || p.category === 'orenyeri'; });
    if (orenYerleri.length === 0) return;
    var section = document.getElementById('yl-must-see');
    var grid = document.getElementById('yl-must-see-grid');
    if (!section || !grid) return;
    section.style.display = 'block';
    // Sayıya göre grid düzeni
    var count = orenYerleri.length;
    if (count === 1) { grid.style.gridTemplateColumns = '1fr'; grid.style.maxWidth = '400px'; grid.style.margin = '0 auto 48px'; }
    else if (count === 2) { grid.style.gridTemplateColumns = 'repeat(2,1fr)'; grid.style.maxWidth = '700px'; grid.style.margin = '0 auto 48px'; }
    else if (count === 3) { grid.style.gridTemplateColumns = 'repeat(3,1fr)'; grid.style.maxWidth = '1000px'; grid.style.margin = '0 auto 48px'; }
    else { grid.style.gridTemplateColumns = 'repeat(auto-fill,minmax(260px,1fr))'; grid.style.maxWidth = 'none'; grid.style.marginBottom = '48px'; }
    grid.innerHTML = orenYerleri.map(function(p, i) {
      var cat = getCatInfo(p.category);
      var isOren = (p.category === 'tarihi' || p.category === 'orenyeri');
      return '<a href="yerler/yer-detay.html?id=' + p.id + '" class="fade-up" data-delay="' + (i * 0.08) + '" style="display:block;background:#fff;border-radius:20px;overflow:hidden;border:1px solid rgba(26,39,68,.06);text-decoration:none;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s;cursor:pointer" onmouseover="this.style.transform=\'translateY(-6px)\';this.style.boxShadow=\'0 20px 50px rgba(26,39,68,.12)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">' +
        '<div style="position:relative;aspect-ratio:4/3;overflow:hidden;' + (p.image ? 'background:linear-gradient(90deg,#e8e4de 25%,#f0ece6 50%,#e8e4de 75%)' : 'background:linear-gradient(135deg,' + cat.bg[0] + ',' + cat.bg[1] + ');display:flex;align-items:center;justify-content:center;font-size:3rem') + '">' +
          (p.image ? '<img src="' + p.image + '" alt="' + p.title + '" style="width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s" loading="lazy" onload="this.style.opacity=1">' : (p.emoji || '🏛')) +
          '<span style="position:absolute;top:12px;left:12px;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:999px;background:' + cat.color + 'cc;color:#fff;backdrop-filter:blur(8px);">' + cat.label + '</span>' +
          (isOren ? '<span style="position:absolute;bottom:30px;left:12px;font-size:.5rem;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(56,161,105,.85);color:#fff;backdrop-filter:blur(8px);white-space:nowrap;">🎫 Müzekart</span>' : '') +
          '<button class="place-save-btn' + (window.isPlaceSaved && isPlaceSaved(p.id) ? ' saved' : '') + '" data-id="' + p.id + '" onclick="event.preventDefault();event.stopPropagation();togglePlaceSave(\'' + p.id + '\')" style="position:absolute;top:10px;right:10px;z-index:2;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;">' + (window.isPlaceSaved && isPlaceSaved(p.id) ? '♥' : '♡') + '</button>' +
          (p.location ? '<span style="position:absolute;bottom:10px;left:12px;font-size:.65rem;color:rgba(255,255,255,.85);font-weight:500;display:flex;align-items:center;gap:3px;text-shadow:0 1px 3px rgba(0,0,0,.5)">📍 ' + p.location + '</span>' : '') +
        '</div>' +
        '<div style="padding:14px 16px 16px">' +
          '<h3 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-weight:700;font-size:.92rem;color:var(--navy);margin-bottom:4px">' + p.title + '</h3>' +
          '<p style="font-size:.72rem;color:var(--text-mid);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + (p.shortDesc || '') + '</p>' +
        '</div></a>';
    }).join('');
    if (typeof scrollFadeIn === 'function') scrollFadeIn();
  })();

  function filterPlaces(btn, cat) {
    activeFilter = cat;
    try { sessionStorage.setItem(YL_FILTER_KEY, cat); } catch(e) {}
    document.querySelectorAll('[onclick^="filterPlaces"]').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    else {
      // Kaydedilmiş filtre için doğru butonu active yap
      var activeBtn = document.querySelector('[onclick="filterPlaces(this,\'' + cat + '\')"]');
      if (activeBtn) activeBtn.classList.add('active');
    }
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('places-grid');
    const noRes = document.getElementById('no-places');

    // Köylerden showInPlaces olanları places formatına çevir
    const villageAsPlaces = (DATA.villages || []).filter(v => v.showInPlaces).map(v => ({
      id: v.id, title: v.title, emoji: v.emoji || '🏘', shortDesc: v.shortDesc || '',
      description: v.description || '', tags: v.tags || [], image: v.image || '',
      imagePos: v.imagePos || 50, category: 'koyu', location: 'Ayvacık',
      _isVillage: true
    }));

    // Mutlaka görülmesi gerekenleri hariç tut (üstte ayrı bölümde gösteriliyorlar)
    var allPlaces = DATA.places.filter(function(p) { return !p.mustSee && p.category !== 'tarihi' && p.category !== 'orenyeri'; }).concat(villageAsPlaces);
    // Günlük değişen karma sıralama (seed: günün tarihi)
    var daySeed = Math.floor(Date.now() / 86400000);
    function seededShuffle(arr) {
      var a = arr.slice();
      var s = daySeed;
      for (var i = a.length - 1; i > 0; i--) {
        s = (s * 16807 + 0) % 2147483647;
        var j = s % (i + 1);
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }
    const filtered = activeFilter === 'all' ? allPlaces : allPlaces.filter(p => p.category === activeFilter);
    const places = seededShuffle(filtered);
    if (places.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
    noRes.style.display = 'none';
    grid.innerHTML = places.map((p, i) => {
      const cat = getCatInfo(p.category);
      const clickAction = p._isVillage ? "window.location.href='koyler/koy-detay.html?id=" + p.id + "'" : "window.location.href='yerler/yer-detay.html?id=" + p.id + "'";
      return `
      <div class="place-card-wrap fade-up" data-delay="${i * 0.06}" onclick="${clickAction}">
        <div class="place-img-box${p.image ? ' has-img' : ''}" style="background-color:${p.image ? '' : 'transparent'};${p.image ? '' : 'background:linear-gradient(135deg,'+cat.bg[0]+','+cat.bg[1]+');'}">
          ${p.image ? '<img src="' + p.image + '" alt="' + p.title + '" style="object-position:center ' + (p.imagePos != null ? p.imagePos : 50) + '%" onload="this.classList.add(\'loaded\')">' : p.emoji}
          <span style="position:absolute;top:12px;left:12px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:${cat.color}b3;color:#fff;backdrop-filter:blur(8px);z-index:1;">${p._isVillage ? '🏘 Köy' : cat.label}</span>
          <button class="place-save-btn${window.isPlaceSaved && isPlaceSaved(p.id) ? ' saved' : ''}" data-id="${p.id}" onclick="event.stopPropagation();togglePlaceSave('${p.id}')" style="position:absolute;top:10px;right:10px;z-index:2;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;">${window.isPlaceSaved && isPlaceSaved(p.id) ? '♥' : '♡'}</button>
        </div>
        <div style="padding:18px 20px 20px;">
          <h3 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);margin-bottom:6px;">${p.title}</h3>
          <p style="font-size:.82rem;color:var(--text-mid);line-height:1.6;margin-bottom:12px;">${p.shortDesc}</p>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">
            ${(p.tags||[]).map(t=>`<span style="font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(26,39,68,.06);color:var(--text-mid);">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;
    }).join('');
    scrollFadeIn();
    const paramId = getParam('id');
    if (paramId) { window.location.href = 'yerler/yer-detay.html?id=' + paramId; return; }
  }

  // Expose functions to global scope for onclick handlers
  window.filterPlaces = filterPlaces;
  window.renderPlacesGrid = renderGrid;

  renderGrid();
}
document.addEventListener('dataReady', pageInit);
</script>



</body>
</html>
