<script>
function pageInit() {
  renderNav({ heroMode: false });
  renderFooter({});
  var slug = new URLSearchParams(window.location.search).get('yazi');
  if (slug) {
    loadSinglePost(slug);
  } else {
    loadBlogPosts();
  }
}

async function loadBlogPosts() {
  const grid = document.getElementById('blog-grid');
  try {
    const snap = await firebase.firestore().collection('blog_posts').limit(50).get();

    const publishedDocs = snap.docs.filter(function(d) { return d.data().status === 'published'; });
    publishedDocs.sort(function(a, b) { return (b.data().publishedAt || '').localeCompare(a.data().publishedAt || ''); });

    if (publishedDocs.length === 0) {
      grid.innerHTML = '<div class="blog-empty">Henüz yazı yayınlanmadı.</div>';
      return;
    }

    grid.innerHTML = publishedDocs.map(function(doc, idx) {
      var p = doc.data();
      var readTime = ''; var date = '';
      var imgHtml = p.image
        ? '<img src="' + p.image + '" alt="' + (p.title || '') + '" loading="lazy" onload="var el=this;setTimeout(function(){el.classList.add(\'loaded\')},50)">'
        : '<div class="blog-emoji">' + (p.emoji || '📝') + '</div>';

      return '<a href="blog?yazi=' + doc.id + '" class="blog-card" style="animation-delay:' + (idx * 0.08) + 's">' +
        '<div class="blog-card-img">' + imgHtml + '</div>' +
        '<div class="blog-card-body">' +
          '<div class="blog-card-cat">' + (p.category || 'Genel') + '</div>' +
          '<h2 class="blog-card-title">' + (p.title || '') + '</h2>' +
          '<p class="blog-card-desc">' + (p.excerpt || '') + '</p>' +
        '</div>' +
      '</a>';
    }).join('');

  } catch(err) {
    grid.innerHTML = '<div class="blog-empty">Yazılar yüklenemedi: ' + err.message + '</div>';
  }
}

async function loadSinglePost(slug) {
  var listSection = document.getElementById('blog-list-section');
  var postSection = document.getElementById('blog-post-section');
  // Hero'yu hemen temizle — eski başlık görünmesin
  var heroContent = document.querySelector('.bh-content');
  heroContent.innerHTML = '<div style="height:40px"></div>';
  // Fade out liste
  listSection.style.display = 'none';
  postSection.style.display = '';
  postSection.classList.add('blog-animate-in');
  window.scrollTo({ top: 0 });

  try {
    var doc = await firebase.firestore().collection('blog_posts').doc(slug).get();
    if (!doc.exists) {
      heroContent.innerHTML = '<a href="blog" style="font-size:.72rem;color:rgba(245,237,224,.4);text-decoration:none;margin-bottom:20px;display:inline-block">← Blog\'a Dön</a><h1 class="bh-h1">Yazı Bulunamadı</h1>';
      document.getElementById('bp-content').innerHTML = '<div style="text-align:center;padding:40px;color:#718096"><a href="blog" style="color:#C4521A;font-weight:700">← Blog\'a Dön</a></div>';
      return;
    }
    var p = doc.data();
    heroContent.innerHTML =
      '<a href="blog" style="font-size:.72rem;font-weight:600;color:rgba(245,237,224,.4);text-decoration:none;margin-bottom:20px;display:inline-block">← Blog\'a Dön</a>' +
      '<div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#D96B2E;margin-bottom:12px">' + (p.category||'Genel') + '</div>' +
      '<h1 class="bh-h1">' + (p.title||'') + '</h1>';

    if (p.image) {
      document.getElementById('bp-img-wrap').innerHTML = '<img src="' + p.image + '" alt="' + (p.title||'') + '" onload="var el=this;setTimeout(function(){el.classList.add(\'loaded\')},50)">';
    }

    document.getElementById('bp-content').innerHTML = p.content || '';

    if (p.tags && p.tags.length) {
      var tagsEl = document.getElementById('bp-tags');
      tagsEl.style.display = '';
      tagsEl.innerHTML = p.tags.map(function(t){return '<span class="post-tag">#'+t+'</span>';}).join('');
    }

    var url = 'https://assosukesfet.com/blog?yazi=' + slug;
    var shareTitle = p.title + ' — Assos\'u Keşfet';
    var shareImg = p.coverImage || '';

    // OG meta tag'larını yazıya özel güncelle
    var ogTitle = document.querySelector('meta[property="og:title"]');
    var ogDesc = document.querySelector('meta[property="og:description"]');
    var ogUrl = document.querySelector('meta[property="og:url"]');
    var ogImg = document.querySelector('meta[property="og:image"]');
    var twTitle = document.querySelector('meta[name="twitter:title"]');
    var twDesc = document.querySelector('meta[name="twitter:description"]');
    var twImg = document.querySelector('meta[name="twitter:image"]');
    if (ogTitle) ogTitle.content = shareTitle;
    if (ogDesc) ogDesc.content = (p.excerpt || p.title || '').substring(0, 160);
    if (ogUrl) ogUrl.content = url;
    if (shareImg && ogImg) ogImg.content = shareImg;
    if (twTitle) twTitle.content = shareTitle;
    if (twDesc) twDesc.content = (p.excerpt || p.title || '').substring(0, 160);
    if (shareImg && twImg) twImg.content = shareImg;

    document.getElementById('bp-share').innerHTML =
      '<div class="post-share-wrap">' +
        '<div class="post-share-title">Bu yazıyı paylaş</div>' +
