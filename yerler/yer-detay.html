</head>
<body>
<div id="nav-placeholder"></div>
<div id="place-hero"></div>
<div id="place-body"></div>
<div id="footer-placeholder"></div>
<script src="../firebase-loader.js?v=6"></script>
<script src="../shared.min.js?v=286"></script>
<script>
function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  var params = new URLSearchParams(window.location.search);
  var placeId = params.get('id');
  if (!placeId) placeId = window.location.hash.replace('#', '');
  if (!placeId) {
    document.getElementById('place-hero').innerHTML = '';
    document.getElementById('place-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Yer bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir yer seçin.</p><a href="../yerler.html" style="color:#C4521A;font-weight:600;">← Gezilecek Yerlere Dön</a></div>';
    return;
  }

  renderPlacePage(placeId);

  var place = (window.DATA?.places || []).find(function(p) { return p.id === placeId; });
  if (place) {
    var seoTitle = place.title + ' — Assos Bölgesi | Assos\'u Keşfet';
    var seoDesc = place.title;
    if (place.location) seoDesc += ', ' + place.location;
    if (place.shortDesc) seoDesc += '. ' + place.shortDesc;
    if (place.tags && place.tags.length) seoDesc += '. ' + place.tags.join(', ');
    seoDesc = seoDesc.substring(0, 160);

    document.title = seoTitle;
    var dm = document.querySelector('meta[name="description"]');
    if (dm) dm.content = seoDesc;
    var ogT = document.querySelector('meta[property="og:title"]');
    var ogD = document.querySelector('meta[property="og:description"]');
    var ogU = document.querySelector('meta[property="og:url"]');
    var ogI = document.querySelector('meta[property="og:image"]');
    var twT = document.querySelector('meta[name="twitter:title"]');
    var twD = document.querySelector('meta[name="twitter:description"]');
    var twI = document.querySelector('meta[name="twitter:image"]');
    if (ogT) ogT.content = seoTitle;
    if (ogD) ogD.content = seoDesc;
    if (ogU) ogU.content = 'https://assosukesfet.com/yerler/yer-detay.html?id=' + placeId;
    if (place.image) {
      if (ogI) ogI.content = place.image;
      if (twI) twI.content = place.image;
    }
    if (twT) twT.content = seoTitle;
    if (twD) twD.content = seoDesc;

    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/yerler/yer-detay.html?id=' + placeId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Gezilecek Yerler','item':'https://assosukesfet.com/yerler'},
        {'@type':'ListItem','position':3,'name':place.title,'item':'https://assosukesfet.com/yerler/yer-detay.html?id='+placeId}
      ]
    });
    document.head.appendChild(bcSchema);

    // Place Schema
    var placeSchema = {
      '@context': 'https://schema.org',
      '@type': 'Place',
      'name': place.title,
      'description': place.description || place.shortDesc || '',
      'url': 'https://assosukesfet.com/yerler/yer-detay.html?id=' + placeId,
      'address': {
        '@type': 'PostalAddress',
        'addressLocality': place.location || 'Ayvacık',
        'addressRegion': 'Ayvacık, Çanakkale',
        'addressCountry': 'TR'
      }
    };
    if (place.image) placeSchema.image = place.image;
    if (place.lat && place.lng) {
      placeSchema.geo = { '@type': 'GeoCoordinates', 'latitude': place.lat, 'longitude': place.lng };
    }
    var ps = document.createElement('script');
    ps.type = 'application/ld+json';
    ps.textContent = JSON.stringify(placeSchema);
    document.head.appendChild(ps);
  }
}
document.addEventListener('dataReady', pageInit);
</script>



</body>
</html>
