  <noscript>
    <div style="max-width:800px;margin:80px auto;padding:40px 24px;text-align:center;font-family:sans-serif">
      <h1 style="font-size:1.8rem;color:#1A2744;margin-bottom:16px">Gezilecek Yer · Assos'u Keşfet</h1>
      <p style="color:#4A5568;line-height:1.7;margin-bottom:20px">Bu sayfa dinamik olarak yükleniyor. JavaScript etkin değilse aşağıdaki bağlantılardan devam edebilirsiniz.</p>
      <p><a href="../yerler.html" style="color:#C4521A;font-weight:600">Tüm Gezilecek Yerler</a> · <a href="../" style="color:#C4521A;font-weight:600">Ana Sayfa</a></p>

<script>
// Yer slug'ini URL'den cikar: once path (/yerler/slug), sonra query (?id=slug), sonra hash
function getYerSlugFromUrl() {
  var m = window.location.pathname.match(/^\/yerler\/([^\/\?#]+)\/?$/);
  if (m && m[1] && m[1] !== 'yer-detay' && m[1] !== 'yer-detay.html') return decodeURIComponent(m[1]);
  var params = new URLSearchParams(window.location.search);
  var q = params.get('id');
  if (q) return q;
  var h = window.location.hash.replace('#', '');
  return h || null;
}

function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  var placeId = getYerSlugFromUrl();
  if (!placeId) {
    document.getElementById('place-hero').innerHTML = '';
    document.getElementById('place-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Yer bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir yer seçin.</p><a href="/yerler" style="color:#C4521A;font-weight:600;">← Gezilecek Yerlere Dön</a></div>';
    return;
  }

  function checkAndRender() {
    var exists = (window.DATA?.places || []).some(function(p) { return p.id === placeId; });
    if (exists) {
      renderPlacePage(placeId);
    } else if (window.DATA && window.DATA.places) {
      renderYerBulunamadi();
    } else {
      renderPlacePage(placeId);
    }
  }
  checkAndRender();
  document.addEventListener('dataReady', checkAndRender);

  function renderYerBulunamadi() {
    document.title = 'Yer Bulunamadı — Assos\'u Keşfet';
    var mr = document.querySelector('meta[name="robots"]');
    if (!mr) { mr = document.createElement('meta'); mr.name = 'robots'; document.head.appendChild(mr); }
    mr.content = 'noindex, nofollow';

    document.getElementById('place-hero').innerHTML =
      '<section style="position:relative;overflow:hidden;padding:130px 24px 60px;text-align:center;background:linear-gradient(160deg,#06101E 0%,#0C1A30 55%,#0A1520 100%);">' +
        '<div style="position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(26,107,138,.12);top:-120px;left:-80px;"></div>' +
        '<div style="position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(196,82,26,.08);bottom:-80px;right:-60px;"></div>' +
        '<div style="position:relative;z-index:2;max-width:620px;margin:0 auto;">' +
          '<div style="font-size:3rem;margin-bottom:8px;opacity:.55">📍</div>' +
          '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:.68rem;font-weight:700;color:rgba(245,237,224,.5);text-transform:uppercase;letter-spacing:.14em;margin-bottom:20px">Bulunamadı</div>' +
          '<h1 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:800;color:#F5EDE0;line-height:1.12;margin-bottom:14px;letter-spacing:-.03em">Aradığın yer <em style="font-family:\'Lora\',serif;font-style:italic;font-weight:500;color:#2490B8">burada değil</em></h1>' +
          '<p style="font-size:.88rem;color:rgba(245,237,224,.4);max-width:460px;margin:0 auto;line-height:1.6">Yer kaldırılmış, yeniden düzenleniyor ya da adresi değişmiş olabilir. Aşağıda diğer gezilecek yerlerimize göz atabilirsin.</p>' +
        '</div>' +
      '</section>';

    var suggestions = (window.DATA?.places || []).slice(0, 6);
    var cardsHtml = suggestions.map(function(p) {
      var imgHtml = p.image
        ? '<img src="' + p.image + '" alt="' + (p.title || '') + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s" onload="this.style.opacity=1">'
        : '<div style="font-size:2rem;opacity:.55">📍</div>';
      return '<a href="/yerler/' + p.id + '" style="display:block;background:#fff;border:1px solid rgba(26,39,68,.06);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;" onmouseover="this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 12px 32px rgba(26,39,68,.08)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">' +
          '<div style="height:110px;background:linear-gradient(135deg,#06101E,#0C1A30);display:flex;align-items:center;justify-content:center;overflow:hidden">' + imgHtml + '</div>' +
          '<div style="padding:12px 14px"><div style="font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#2490B8;margin-bottom:4px">Gezilecek Yer</div><h3 style="font-size:.85rem;font-weight:800;color:#1A2744;margin:0;line-height:1.3">' + (p.title || '') + '</h3></div>' +
        '</a>';
    }).join('');

    document.getElementById('place-body').innerHTML =
      '<section style="max-width:900px;margin:0 auto;padding:48px 24px 80px;">' +
        '<div style="text-align:center;padding:10px 0 8px">' +
          '<a href="/yerler" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#C4521A;color:#F5EDE0;border-radius:12px;text-decoration:none;font-weight:700;font-size:.88rem;transition:all .25s;box-shadow:0 6px 20px rgba(196,82,26,.25)" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 10px 28px rgba(196,82,26,.35)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'0 6px 20px rgba(196,82,26,.25)\'">Tüm Yerlere Göz At →</a>' +
        '</div>' +
        (suggestions.length > 0 ?
          '<div style="margin-top:44px;padding-top:32px;border-top:1px solid rgba(0,0,0,.06)">' +
            '<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#718096;margin-bottom:24px;text-align:center">Bunlara göz atmak ister misin?</div>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">' + cardsHtml + '</div>' +
          '</div>'
        : '') +
      '</section>';
  }

  var place = (window.DATA?.places || []).find(function(p) { return p.id === placeId; });
  if (place) {
    var seoTitle = place.title + ' — Assos Bölgesi | Assos\'u Keşfet';
    var seoDesc = place.title;
    if (place.location) seoDesc += ', ' + place.location;
    if (place.shortDesc) seoDesc += '. ' + place.shortDesc;
    if (place.tags && place.tags.length) seoDesc += '. ' + place.tags.join(', ');
    seoDesc = seoDesc.substring(0, 160);

    document.title = seoTitle;
    var dm = document.querySelector('meta[name="description"]');
    if (dm) dm.content = seoDesc;
    var ogT = document.querySelector('meta[property="og:title"]');
    var ogD = document.querySelector('meta[property="og:description"]');
    var ogU = document.querySelector('meta[property="og:url"]');
    var ogI = document.querySelector('meta[property="og:image"]');
    var twT = document.querySelector('meta[name="twitter:title"]');
    var twD = document.querySelector('meta[name="twitter:description"]');
    var twI = document.querySelector('meta[name="twitter:image"]');
    if (ogT) ogT.content = seoTitle;
    if (ogD) ogD.content = seoDesc;
    if (ogU) ogU.content = 'https://assosukesfet.com/yerler/' + placeId;
    if (place.image) {
      if (ogI) ogI.content = place.image;
      if (twI) twI.content = place.image;
    }
    if (twT) twT.content = seoTitle;
    if (twD) twD.content = seoDesc;

    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/yerler/' + placeId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Gezilecek Yerler','item':'https://assosukesfet.com/yerler'},
        {'@type':'ListItem','position':3,'name':place.title,'item':'https://assosukesfet.com/yerler/'+placeId}
      ]
    });
    document.head.appendChild(bcSchema);

    // TouristAttraction Schema — gezilecek yerler turistik cekim merkezi olarak isaretlenir
    var placeSchema = {
      '@context': 'https://schema.org',
      '@type': 'TouristAttraction',
      'name': place.title,
      'description': place.description || place.shortDesc || '',
      'url': 'https://assosukesfet.com/yerler/' + placeId,
      'touristType': ['Gezgin','Aile','Cift','Kultur Turizmi'],
      'isAccessibleForFree': true,
      'publicAccess': true,
      'address': {
        '@type': 'PostalAddress',
        'addressLocality': place.location || 'Ayvacık',
        'addressRegion': 'Ayvacık, Çanakkale',
        'addressCountry': 'TR'
      }
    };
    if (place.image) placeSchema.image = place.image;
    if (place.lat && place.lng) {
      placeSchema.geo = { '@type': 'GeoCoordinates', 'latitude': place.lat, 'longitude': place.lng };
    }
    var ps = document.createElement('script');
    ps.type = 'application/ld+json';
    ps.textContent = JSON.stringify(placeSchema);
    document.head.appendChild(ps);
  }
}
document.addEventListener('dataReady', pageInit);
</script>
