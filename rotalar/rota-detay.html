<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/icon.png" sizes="48x48" type="image/png"><link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <title>Rota — Assos'u Keşfet</title>
  <meta name="description" content="Assos ve Ayvacık rota detayı.">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://assosukesfet.com/rotalar/rota-detay.html">
  <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/assosu-kesfet.firebasestorage.app/o/site%2Fog-image.jpg?alt=media&token=70d62a44-9142-43d8-aee4-de790f5c7dcd">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:site_name" content="Assos'u Keşfet">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Rota — Assos'u Keşfet">
  <meta name="twitter:description" content="Assos ve Ayvacık rota detayı.">
  <meta name="twitter:image" content="https://firebasestorage.googleapis.com/v0/b/assosu-kesfet.firebasestorage.app/o/site%2Fog-image.jpg?alt=media&token=70d62a44-9142-43d8-aee4-de790f5c7dcd">

</head>
<body>
<div id="nav-placeholder"></div>
<div id="route-hero"></div>
<div id="route-body"></div>
<div id="footer-placeholder"></div>
<script src="../firebase-loader.js?v=6"></script>
<script src="../shared.min.js?v=314"></script>
<script>
function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  const params = new URLSearchParams(window.location.search);
  let routeId = params.get('id');
  if (!routeId) routeId = window.location.hash.replace('#', '');
  if (!routeId) {
    document.getElementById('route-hero').innerHTML = '';
    document.getElementById('route-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Rota bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir rota seçin.</p><a href="../rotalar.html" style="color:#C4521A;font-weight:600;">← Rotalara Dön</a></div>';
    return;
  }

  renderRoutePage(routeId);
  // Firebase'den güncel veri geldiğinde tekrar render et
  document.addEventListener('dataReady', function() { renderRoutePage(routeId); });

  const route = (window.DATA?.routes || []).find(r => r.id === routeId);
  if (route) {
    const seoTitle = route.title + ' — Assos Gezi Rotası | Assos\'u Keşfet';
    const seoDesc = route.title + ': ' + (route.shortDesc || '') + ' | ' + (route.sure || '') + ', ' + (route.stops?.length || '') + ' durak';
    document.title = seoTitle;
    const descMeta = document.querySelector('meta[name="description"]');
    if (descMeta) descMeta.content = seoDesc;
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const ogUrl = document.querySelector('meta[property="og:url"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');
    if (ogTitle) ogTitle.content = seoTitle;
    if (ogDesc) ogDesc.content = seoDesc;
    if (ogUrl) ogUrl.content = 'https://assosukesfet.com/rotalar/rota-detay.html?id=' + routeId;
    if (twTitle) twTitle.content = seoTitle;
    if (twDesc) twDesc.content = route.shortDesc || '';

    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/rotalar/rota-detay.html?id=' + routeId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Rotalar','item':'https://assosukesfet.com/rotalar'},
        {'@type':'ListItem','position':3,'name':route.title,'item':'https://assosukesfet.com/rotalar/rota-detay.html?id='+routeId}
      ]
    });
    document.head.appendChild(bcSchema);

    // TouristTrip Schema — rota detaylari (AI/Google cevaplarinda zengin bilgi)
    var tripSchema = {
      '@context': 'https://schema.org',
      '@type': 'TouristTrip',
      'name': route.title,
      'description': route.description || route.shortDesc || ('Assos bolgesi icin ' + route.title + ' rotasi'),
      'url': 'https://assosukesfet.com/rotalar/rota-detay.html?id=' + routeId,
      'touristType': ['Gezgin','Aile','Cift','Solo'],
      'itinerary': {
        '@type': 'ItemList',
        'numberOfItems': (route.stops || []).length,
        'itemListElement': (route.stops || []).map(function(stop, idx) {
          return {
            '@type': 'ListItem',
            'position': idx + 1,
            'item': {
              '@type': 'TouristAttraction',
              'name': stop.title || stop.name || ('Durak ' + (idx + 1)),
              'description': stop.description || stop.desc || ''
            }
          };
        })
      }
    };
    if (route.sure || route.duration) tripSchema.duration = String(route.sure || route.duration);
    if (route.image) tripSchema.image = route.image;
    if (route.mesafe || route.distance) {
      tripSchema.additionalProperty = [
        { '@type': 'PropertyValue', 'name': 'Mesafe', 'value': String(route.mesafe || route.distance) }
      ];
    }
    var tripScript = document.createElement('script');
    tripScript.type = 'application/ld+json';
    tripScript.textContent = JSON.stringify(tripSchema);
    document.head.appendChild(tripScript);
  }
}
document.addEventListener('dataReady', pageInit);
</script>



</body>
</html>
