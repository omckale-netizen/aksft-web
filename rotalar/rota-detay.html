<body>
<div id="nav-placeholder"></div>
<div id="route-hero"></div>
<div id="route-body"></div>
<div id="footer-placeholder"></div>
<script src="../firebase-loader.js"></script>
<script src="../data.js"></script>
<script src="../shared.js?v=42"></script>
<script>
function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  const params = new URLSearchParams(window.location.search);
  let routeId = params.get('id');
  if (!routeId) routeId = window.location.hash.replace('#', '');
  if (!routeId) {
    document.getElementById('route-hero').innerHTML = '';
    document.getElementById('route-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Rota bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir rota seçin.</p><a href="../rotalar.html" style="color:#C4521A;font-weight:600;">← Rotalara Dön</a></div>';
    return;
  }

  renderRoutePage(routeId);

  const route = (window.DATA?.routes || []).find(r => r.id === routeId);
  if (route) {
    document.title = route.title + ' — Assos\'u Keşfet';
    const descMeta = document.querySelector('meta[name="description"]');
    if (descMeta) descMeta.content = route.shortDesc || '';
    // OG taglarini guncelle
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const ogUrl = document.querySelector('meta[property="og:url"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');
    if (ogTitle) ogTitle.content = route.title + ' — Assos\'u Keşfet';
    if (ogDesc) ogDesc.content = route.shortDesc || '';
    if (ogUrl) ogUrl.content = 'https://assosukesfet.com/rotalar/rota-detay.html?id=' + routeId;
    if (twTitle) twTitle.content = route.title + ' — Assos\'u Keşfet';
    if (twDesc) twDesc.content = route.shortDesc || '';
  }
}
document.addEventListener('dataReady', pageInit);
</script>
</body>
</html>
