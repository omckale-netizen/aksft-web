</head>
<body>
<div id="nav-placeholder"></div>
<div id="route-hero"></div>
<div id="route-body">
  <noscript>
    <div style="max-width:800px;margin:80px auto;padding:40px 24px;text-align:center;font-family:sans-serif">
      <h1 style="font-size:1.8rem;color:#1A2744;margin-bottom:16px">Assos Gezi Rotası · Assos'u Keşfet</h1>
      <p style="color:#4A5568;line-height:1.7;margin-bottom:20px">Bu sayfa dinamik olarak yükleniyor. JavaScript etkin değilse aşağıdaki bağlantılardan devam edebilirsiniz.</p>
      <p><a href="../rotalar.html" style="color:#C4521A;font-weight:600">Tüm Rotalar</a> · <a href="../" style="color:#C4521A;font-weight:600">Ana Sayfa</a></p>
    </div>
  </noscript>
</div>
<div id="footer-placeholder"></div>
<script src="../firebase-loader.js?v=6"></script>
<script src="../shared.min.js?v=366"></script>
<script>
// Rota slug'ini URL'den cikar: once path (/rotalar/slug), sonra query (?id=slug), sonra hash
function getRotaSlugFromUrl() {
  var m = window.location.pathname.match(/^\/rotalar\/([^\/\?#]+)\/?$/);
  if (m && m[1] && m[1] !== 'rota-detay' && m[1] !== 'rota-detay.html') return decodeURIComponent(m[1]);
  var params = new URLSearchParams(window.location.search);
  var q = params.get('id');
  if (q) return q;
  var h = window.location.hash.replace('#', '');
  return h || null;
}

function pageInit() {
  renderNav({ heroMode: false, basePath: '../' });
  renderFooter({ basePath: '../' });

  let routeId = getRotaSlugFromUrl();
  if (!routeId) {
    document.getElementById('route-hero').innerHTML = '';
    document.getElementById('route-body').innerHTML = '<div style="padding:120px 24px;text-align:center;"><h2 style="font-family:Plus Jakarta Sans,sans-serif;color:#1A2744;margin-bottom:12px;">Rota bulunamadı</h2><p style="color:#718096;margin-bottom:24px;">Lütfen geçerli bir rota seçin.</p><a href="/rotalar" style="color:#C4521A;font-weight:600;">← Rotalara Dön</a></div>';
    return;
  }

  // Rota DATA'da var mi? Yoksa "Bulunamadi" empty state goster.
  function checkAndRender() {
    var exists = (window.DATA?.routes || []).some(r => r.id === routeId);
    if (exists) {
      renderRoutePage(routeId);
    } else if (window.DATA && window.DATA.routes) {
      // DATA yuklendi ama rota yok -> Bulunamadi state
      renderRotaBulunamadi();
    } else {
      // DATA henuz yok -> skeleton/placeholder
      renderRoutePage(routeId);
    }
  }
  checkAndRender();
  // Firebase'den guncel veri geldiginde tekrar kontrol et
  document.addEventListener('dataReady', checkAndRender);

  function renderRotaBulunamadi() {
    // NOT: noindex EKLENMEZ — static data.js stale olabilir; SSR 410 ile
    // gercek not-found'u handle eder (babakale-kalesi case).
    document.title = 'Rota Bulunamadı — Assos\'u Keşfet';

    // Hero (dark)
    var heroEl = document.getElementById('route-hero');
    heroEl.innerHTML =
      '<section style="position:relative;overflow:hidden;padding:130px 24px 60px;text-align:center;background:linear-gradient(160deg,#06101E 0%,#0C1A30 55%,#0A1520 100%);">' +
        '<div style="position:absolute;width:400px;height:400px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(196,82,26,.08);top:-120px;left:-80px;"></div>' +
        '<div style="position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(100px);pointer-events:none;background:rgba(26,107,138,.06);bottom:-80px;right:-60px;"></div>' +
        '<div style="position:relative;z-index:2;max-width:620px;margin:0 auto;">' +
          '<div style="font-size:3rem;margin-bottom:8px;opacity:.5">🗺️</div>' +
          '<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:.68rem;font-weight:700;color:rgba(245,237,224,.5);text-transform:uppercase;letter-spacing:.14em;margin-bottom:20px">Bulunamadı</div>' +
          '<h1 style="font-family:\'Plus Jakarta Sans\',sans-serif;font-size:clamp(2rem,5vw,3rem);font-weight:800;color:#F5EDE0;line-height:1.12;margin-bottom:14px;letter-spacing:-.03em">Aradığın rota <em style="font-family:\'Lora\',serif;font-style:italic;font-weight:500;color:#D96B2E">burada değil</em></h1>' +
          '<p style="font-size:.88rem;color:rgba(245,237,224,.4);max-width:460px;margin:0 auto;line-height:1.6">Rota kaldırılmış, yeniden düzenleniyor ya da adresi değişmiş olabilir. Aşağıda diğer rotalarımıza göz atabilirsin.</p>' +
        '</div>' +
      '</section>';

    // Body (light) - CTA + onerilen rotalar
    var suggestions = (window.DATA?.routes || []).slice(0, 3);
    var cardsHtml = suggestions.map(function(r) {
      var headerBg = r.headerBg || 'linear-gradient(160deg,#1A2744,#243255)';
      var emoji = r.emoji || '🗺';
      var tag = r.tag || '';
      var tagBg = r.tagColor || 'rgba(196,82,26,0.3)';
      var tagColor = r.tagTextColor || '#E8A07A';
      return '<a href="/rotalar/' + r.id + '" style="display:block;background:#fff;border:1px solid rgba(26,39,68,.06);border-radius:18px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;" onmouseover="this.style.transform=\'translateY(-4px)\';this.style.boxShadow=\'0 16px 40px rgba(26,39,68,.1)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">' +
          '<div style="height:100px;background-color:#1A2744;background-image:' + headerBg + ';display:flex;align-items:center;justify-content:center;position:relative">' +
            '<div style="font-size:2.2rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,.25))">' + emoji + '</div>' +
            (tag ? '<div style="position:absolute;top:10px;left:10px;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:999px;background:' + tagBg + ';color:' + tagColor + ';">' + tag + '</div>' : '') +
          '</div>' +
          '<div style="padding:16px 18px 18px">' +
            '<h3 style="font-size:.95rem;font-weight:800;color:#1A2744;margin:0 0 6px;line-height:1.3">' + (r.title || '') + '</h3>' +
            '<p style="font-size:.76rem;color:#718096;line-height:1.55;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + (r.shortDesc || '') + '</p>' +
          '</div>' +
        '</a>';
    }).join('');

    document.getElementById('route-body').innerHTML =
      '<section style="max-width:900px;margin:0 auto;padding:48px 24px 80px;">' +
        '<div style="text-align:center;padding:10px 0 8px">' +
          '<a href="/rotalar" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#C4521A;color:#F5EDE0;border-radius:12px;text-decoration:none;font-weight:700;font-size:.88rem;transition:all .25s;box-shadow:0 6px 20px rgba(196,82,26,.25)" onmouseover="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 10px 28px rgba(196,82,26,.35)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'0 6px 20px rgba(196,82,26,.25)\'">Tüm Rotalara Göz At →</a>' +
        '</div>' +
        (suggestions.length > 0 ?
          '<div style="margin-top:44px;padding-top:32px;border-top:1px solid rgba(0,0,0,.06)">' +
            '<div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#718096;margin-bottom:24px;text-align:center">Bunlara göz atmak ister misin?</div>' +
            '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">' + cardsHtml + '</div>' +
          '</div>'
        : '') +
      '</section>';
  }

  const route = (window.DATA?.routes || []).find(r => r.id === routeId);
  if (route) {
    // Assos odakli tail, 2x Assos max. Sure yazilmaz.
    const _tAssos = /assos/i.test(route.title || '');
    const _tRotaTip = /(rota|gezi|tur)/i.test(route.title || '');
    let _keywordTail;
    if (_tAssos && _tRotaTip) _keywordTail = 'Detaylı Rehber';
    else if (_tAssos) _keywordTail = 'Gezi Rotası ve Detaylı Rehber';
    else if (_tRotaTip) _keywordTail = 'Detaylı Assos Rehberi';
    else _keywordTail = 'Assos Gezi Rotası ve Rehberi';
    const seoTitle = (route.title || 'Rota') + ' — ' + _keywordTail + ' | Assos\'u Keşfet';
    const _shortBase = (route.shortDesc || 'Çanakkale Ayvacık Assos gezi rotası').replace(/\s+/g, ' ').trim();
    const seoDesc = (route.title || 'Rota') + ' — ' + _shortBase + '. Adım adım rehber ve harita ile Assos keşfi.';
    // SSR zaten title set ettiyse dokunma (flicker fix)
    if (document.title === 'Rota — Assos\'u Keşfet' || !document.title.includes(route.title)) document.title = seoTitle;
    const descMeta = document.querySelector('meta[name="description"]');
    if (descMeta && descMeta.content.length < 100) descMeta.content = seoDesc;
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const ogUrl = document.querySelector('meta[property="og:url"]');
    const twTitle = document.querySelector('meta[name="twitter:title"]');
    const twDesc = document.querySelector('meta[name="twitter:description"]');
    if (ogTitle) ogTitle.content = seoTitle;
    if (ogDesc) ogDesc.content = seoDesc;
    if (ogUrl) ogUrl.content = 'https://assosukesfet.com/rotalar/' + routeId;
    if (twTitle) twTitle.content = seoTitle;
    if (twDesc) twDesc.content = route.shortDesc || '';

    // Canonical URL
    var canonicalUrl = 'https://assosukesfet.com/rotalar/' + routeId;
    var canonicalEl = document.querySelector('link[rel="canonical"]');
    if (!canonicalEl) { canonicalEl = document.createElement('link'); canonicalEl.rel = 'canonical'; document.head.appendChild(canonicalEl); }
    canonicalEl.href = canonicalUrl;

    // Breadcrumb Schema
    var bcSchema = document.createElement('script');
    bcSchema.type = 'application/ld+json';
    bcSchema.textContent = JSON.stringify({
      '@context':'https://schema.org','@type':'BreadcrumbList',
      'itemListElement':[
        {'@type':'ListItem','position':1,'name':'Anasayfa','item':'https://assosukesfet.com'},
        {'@type':'ListItem','position':2,'name':'Rotalar','item':'https://assosukesfet.com/rotalar'},
        {'@type':'ListItem','position':3,'name':route.title,'item':'https://assosukesfet.com/rotalar/'+routeId}
      ]
    });
    document.head.appendChild(bcSchema);

    // TouristTrip Schema — rota detaylari (AI/Google cevaplarinda zengin bilgi)
    var tripSchema = {
      '@context': 'https://schema.org',
      '@type': 'TouristTrip',
      'name': route.title,
      'description': route.description || route.shortDesc || ('Assos bolgesi icin ' + route.title + ' rotasi'),
      'url': 'https://assosukesfet.com/rotalar/' + routeId,
      'touristType': ['Gezgin','Aile','Cift','Solo'],
      'itinerary': {
        '@type': 'ItemList',
        'numberOfItems': (route.stops || []).length,
        'itemListElement': (route.stops || []).map(function(stop, idx) {
          return {
            '@type': 'ListItem',
            'position': idx + 1,
            'item': {
              '@type': 'TouristAttraction',
              'name': stop.title || stop.name || ('Durak ' + (idx + 1)),
              'description': stop.description || stop.desc || ''
            }
          };
        })
      }
    };
    if (route.sure || route.duration) tripSchema.duration = String(route.sure || route.duration);
    if (route.image) tripSchema.image = route.image;
    if (route.mesafe || route.distance) {
      tripSchema.additionalProperty = [
        { '@type': 'PropertyValue', 'name': 'Mesafe', 'value': String(route.mesafe || route.distance) }
      ];
    }
    var tripScript = document.createElement('script');
    tripScript.type = 'application/ld+json';
    tripScript.textContent = JSON.stringify(tripSchema);
    document.head.appendChild(tripScript);
  }
}
document.addEventListener('dataReady', pageInit);
</script>



</body>
</html>
